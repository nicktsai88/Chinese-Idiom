            { id: 26, term: "人贓俱獲", definition: "成語。嫌犯與贓物同時被當場查獲。", sentence1: "警方在歹徒銷贓時破門而入，將他們人贓俱獲。", sentence2: "他正在偷腳踏車時被車主當場逮住，人贓俱獲，百口莫辯。", scene: "嫌犯與贓物同時被當場查獲。" },
            { id: 27, term: "入耳為真，不探究事實，則易為表面所惑", definition: "語錄/警句。指聽到傳聞就信以為真而不去求證，很容易被事物的表象所欺騙。", sentence1: "網路謠言滿天飛，若入耳為真，不探究事實，則易為表面所惑。", sentence2: "對於八卦新聞，我們應該保持懷疑，畢竟入耳為真而不探究事實，很容易產生誤解。", scene: "指聽到傳聞就信以為真而不去求證，很容易被事物的表象所欺騙。" },
            { id: 28, term: "刀子嘴，豆腐心", definition: "諺語。形容人說話尖酸刻薄，但內心卻很柔軟善良。", sentence1: "媽媽雖然常罵你，但她是刀子嘴，豆腐心，其實心裡很愛你。", sentence2: "別看他平時刀子嘴，豆腐心的，員工有困難時他總是第一個幫忙。", scene: "形容人說話尖酸刻薄，但內心卻很柔軟善良。" },
            { id: 29, term: "刀割痕易合，語傷恨難消", definition: "諺語。刀傷容易癒合，但言語造成的傷害卻難以消除。勸人說話謹慎。", sentence1: "吵架時千萬別說出傷人的話，要知道刀割痕易合，語傷恨難消。", sentence2: "他的那句嘲諷讓她記了一輩子，真是刀割痕易合，語傷恨難消。", scene: "刀傷容易癒合，但言語造成的傷害卻難以消除。勸人說話謹慎。" },
            { id: 30, term: "力拔山兮氣蓋世", definition: "詩詞名句 (項羽《垓下歌》)。形容人的力量強大，氣勢雄偉無比。", sentence1: "看那位舉重選手輕易舉起槓鈴，真有力拔山兮氣蓋世的風範。", sentence2: "電影中的超級英雄登場時，展現出力拔山兮氣蓋世的威猛。", scene: "形容人的力量強大，氣勢雄偉無比。" },
            { id: 31, term: "十拿九穩", definition: "成語。比喻非常有把握，成功的機率極高。", sentence1: "以他的實力參加這次比賽，奪冠可以說是十拿九穩。", sentence2: "這項計畫經過縝密的評估，執行起來應該是十拿九穩了。", scene: "比喻非常有把握，成功的機率極高。" },
            { id: 32, term: "三寸不爛之舌", definition: "成語。形容人能言善道，極具說服力。", sentence1: "他憑藉著三寸不爛之舌，成功說服了投資人注資。", sentence2: "業務員靠的就是這三寸不爛之舌，將產品推銷給千家萬戶。", scene: "形容人能言善道，極具說服力。" },
            { id: 33, term: "三不五時", definition: "諺語 (源自閩南語)。指經常、時常。", sentence1: "他搬出去住後，還是會三不五時回家探望父母。", sentence2: "這台舊電腦三不五時就當機，實在讓人很困擾。", scene: "指經常、時常。" },
            { id: 34, term: "三顧茅廬的劉備", definition: "典故。三國時期劉備三次拜訪諸葛亮，比喻誠心誠意地邀請或拜訪人才。", sentence1: "為了請這位大師出山，老闆效法三顧茅廬的劉備，終於感動了對方。", sentence2: "公司若渴求人才，就應有三顧茅廬的劉備那樣的誠意與耐心。", scene: "比喻誠心誠意地邀請或拜訪人才。" },
            { id: 35, term: "乞丐趕廟公", definition: "諺語。比喻喧賓奪主，外來者反客為主欺壓原主人。", sentence1: "他剛搬來就對鄰居指手畫腳，簡直是乞丐趕廟公。", sentence2: "借住的親戚居然要求屋主搬離主臥室，這行為根本是乞丐趕廟公。", scene: "比喻喧賓奪主，外來者反客為主欺壓原主人。" },
            { id: 36, term: "凡事豫則立，不豫則廢", definition: "語錄 (出自《禮記》)。做任何事情，事前有準備就能成功，沒有準備就會失敗。", sentence1: "明天要出國，今晚就該把行李整理好，畢竟凡事豫則立，不豫則廢。", sentence2: "公司在推出新產品前做了大量的市場調查，因為他們深知凡事豫則立，不豫則廢。", scene: "做任何事情，事前有準備就能成功，沒有準備就會失敗。" },
            { id: 37, term: "千山鳥飛絕，萬徑人蹤滅", definition: "詩詞名句 (柳宗元《江雪》)。形容大雪封山，極其荒涼幽靜的景象。", sentence1: "寒冬來到這座高山，眼前盡是千山鳥飛絕，萬徑人蹤滅的蕭瑟景象。", sentence2: "這幅雪景圖完美呈現了千山鳥飛絕，萬徑人蹤滅的孤寂意境。", scene: "形容大雪封山，極其荒涼幽靜的景象。" },
            { id: 38, term: "千里之行，始於足下", definition: "諺語/語錄 (出自《老子》)。走一千里的路，是從邁出第一步開始的。比喻事情的成功都是由小而大逐漸積累的。", sentence1: "學習外語雖然困難，但千里之行，始於足下，每天背幾個單字也是進步。", sentence2: "不要覺得目標遙遠就放棄，千里之行，始於足下，現在就開始行動吧！", scene: "走一千里的路，是從邁出第一步開始的。比喻事情的成功都是由小而大逐漸積累的。" },
            { id: 39, term: "千呼萬喚始出來，猶抱琵琶半遮面", definition: "詩詞名句 (白居易《琵琶行》)。形容一再催促、呼喚才肯出現，且姿態嬌羞掩飾。", sentence1: "這款受萬眾矚目的新手機，今天終於千呼萬喚始出來了。", sentence2: "那位神祕嘉賓千呼萬喚始出來，猶抱琵琶半遮面，讓台下觀眾充滿好奇。", scene: "形容一再催促、呼喚才肯出現，且姿態嬌羞掩飾。" },
            { id: 40, term: "口水戰", definition: "詞語。指雙方或多方透過言語、文章進行激烈的爭論或互相攻擊。", sentence1: "選舉期間，候選人之間經常爆發激烈的口水戰。", sentence2: "網路上針對這個議題，兩派網友已經打了一整天的口水戰。", scene: "指雙方或多方透過言語、文章進行激烈的爭論或互相攻擊。" },
            { id: 41, term: "口沸目赤", definition: "成語。形容人情緒激動，聲音吵雜，眼眶發紅，爭論不休的樣子。", sentence1: "為了這個企劃案，他們兩人在會議室裡爭得口沸目赤。", sentence2: "看到他們為了小事吵得口沸目赤，旁人都覺得很無奈。", scene: "形容人情緒激動，聲音吵雜，眼眶發紅，爭論不休的樣子。" },
            { id: 42, term: "口是傷人斧", definition: "諺語/警句。言語猶如一把利斧，容易深深傷害別人的心。", sentence1: "父母管教小孩時要注意用詞，要知道口是傷人斧，別造成孩子心理陰影。", sentence2: "他雖然是無心的，但口是傷人斧，這句話已經深深傷害了朋友。", scene: "言語猶如一把利斧，容易深深傷害別人的心。" },
            { id: 43, term: "口無遮攔", definition: "成語。說話沒有顧忌，有什麼說什麼，缺乏分寸。", sentence1: "他個性直率，但有時候口無遮攔，容易得罪人。", sentence2: "喝醉酒後，他開始口無遮攔地說出別人的隱私。", scene: "說話沒有顧忌，有什麼說什麼，缺乏分寸。" },
            { id: 44, term: "口碑載道", definition: "成語。形容到處都是稱讚的聲音。極言受人稱頌。", sentence1: "這家餐廳的料理實在太美味了，難怪開幕不久就口碑載道。", sentence2: "他在地方上樂善好施，是一位口碑載道的大善人。", scene: "形容到處都是稱讚的聲音。極言受人稱頌。" },
            { id: 45, term: "士為知己者死，女為悅己者容", definition: "語錄/典故。有志之士願意為賞識自己的人效死，女子願意為欣賞自己的人精心打扮。", sentence1: "老闆對他有知遇之恩，他自然願意傾盡全力，這就是士為知己者死。", sentence2: "為了參加晚宴見心上人，她特地買了新禮服，真是女為悅己者容。", scene: "有志之士願意為賞識自己的人效死，女子願意為欣賞自己的人精心打扮。" },
            { id: 46, term: "大言不慚", definition: "成語。說大話而不覺得羞愧。", sentence1: "他明明什麼都不懂，卻大言不慚地吹噓自己是專家。", sentence2: "看到他大言不慚地搶走別人的功勞，大家都很生氣。", scene: "說大話而不覺得羞愧。" },
            { id: 47, term: "大俗賣", definition: "詞語 (源自閩南語)。指大降價、大拍賣。", sentence1: "年底百貨公司舉辦大俗賣，吸引了許多搶便宜的顧客。", sentence2: "這個攤位的衣服正在大俗賣，三件只要五百元。", scene: "指大降價、大拍賣。" },
            { id: 48, term: "大展辯才", definition: "詞語。充分展現出優秀的辯論口才。", sentence1: "在這場辯論賽中，他大展辯才，成功駁倒了對方的論點。", sentence2: "面對記者的尖銳提問，發言人大展辯才，巧妙地化解了危機。", scene: "充分展現出優秀的辯論口才。" },
            { id: 49, term: "大智若愚", definition: "成語。具有極高智慧的人，表面上看起來似乎很平庸愚笨。", sentence1: "他平時不愛出風頭，其實是大智若愚，關鍵時刻總能提出精闢見解。", sentence2: "真正的高手往往大智若愚，不會到處炫耀自己的聰明才智。", scene: "具有極高智慧的人，表面上看起來似乎很平庸愚笨。" },
            { id: 50, term: "大發雷霆", definition: "成語。比喻發出極大的脾氣，大聲斥責。", sentence1: "知道兒子又逃學後，父親氣得大發雷霆。", sentence2: "因為下屬犯了嚴重的錯誤，總經理在會議上大發雷霆。", scene: "比喻發出極大的脾氣，大聲斥責。" },
            { id: 51, term: "大盜之行，天下圍攻", definition: "戲謔語。仿造「大道之行也，天下為公」，指惡劣的行徑或大盜橫行時，會引發天下人的群起撻伐。", sentence1: "這個詐騙集團的首腦終於落網，真是大盜之行，天下圍攻。", sentence2: "企業若不顧道德賺黑心錢，必將面臨大盜之行，天下圍攻的下場。", scene: "指惡劣的行徑或大盜橫行時，會引發天下人的群起撻伐。" },
            { id: 52, term: "大道之行，天下為公", definition: "語錄 (出自《禮記》)。在理想的政治環境下，天下是屬於全體民眾的，而非一人一家之私有。", sentence1: "國父孫中山先生終生倡導「大道之行，天下為公」的理念。", sentence2: "民主社會的真諦，正體現了大道之行，天下為公的理想。", scene: "在理想的政治環境下，天下是屬於全體民眾的，而非一人一家之私有。" },
            { id: 53, term: "大膽假設，小心求證", definition: "胡適語錄。做學問或研究事物時，應勇於提出假設，再謹慎地尋求證據來證明。", sentence1: "在科學研究中，我們必須秉持大膽假設，小心求證的精神。", sentence2: "警察辦案時，往往先大膽假設嫌犯的動機，再小心求證現場的線索。", scene: "做學問或研究事物時，應勇於提出假設，再謹慎地尋求證據來證明。" },
            { id: 54, term: "己所不欲，勿施於人", definition: "語錄 (出自《論語》)。自己所不喜歡的事物或對待方式，不要強加在別人身上。", sentence1: "我們不喜歡被噪音干擾，就應該己所不欲，勿施於人，不要在深夜大聲喧嘩。", sentence2: "己所不欲，勿施於人是維持良好人際關係的基本準則。", scene: "自己所不喜歡的事物或對待方式，不要強加在別人身上。" },
            { id: 55, term: "才華在逆境中展現，在順境中被掩藏", definition: "語錄。指人在遇到困難和挑戰時，往往能激發出潛能；而在安逸中則容易平庸。", sentence1: "這次公司的危機讓他發揮了極大的領導力，證明了才華在逆境中展現。", sentence2: "他經歷過許多挫折才獲得今天的成就，正是因為才華在逆境中展現。", scene: "指人在遇到困難和挑戰時，往往能激發出潛能；而在安逸中則容易平庸。" },
            { id: 56, term: "不入虎穴，焉得虎子", definition: "諺語/典故。不進老虎洞，怎麼能捉到小老虎。比喻不經歷危險，就不能獲得成功。", sentence1: "這項投資雖然風險極高，但不入虎穴，焉得虎子，我們決定拼一拼。", sentence2: "為了取得第一手的新聞畫面，記者深知不入虎穴，焉得虎子的道理，深入戰區。", scene: "不進老虎洞，怎麼能捉到小老虎。比喻不經歷危險，就不能獲得成功。" },
            { id: 57, term: "不以言舉人，不以人廢言", definition: "語錄 (出自《論語》)。不因為一個人說了好話就提拔他，也不因為一個人品行有瑕疵就完全否定他的好意見。", sentence1: "好的領導者懂得不以言舉人，不以人廢言，客觀地評估部屬的建議。", sentence2: "即使是他這個有過錯的人提出的方案，我們也應當不以人廢言，仔細審視。", scene: "不因為一個人說了好話就提拔他，也不因為一個人品行有瑕疵就完全否定他的好意見。" },
            { id: 58, term: "不可收拾", definition: "成語。指事情發展到極為嚴重、無法挽救的地步。", sentence1: "兩個人的誤會越來越深，局面已經到了不可收拾的地步。", sentence2: "大火乘著風勢迅速蔓延，火情變得不可收拾。", scene: "指事情發展到極為嚴重、無法挽救的地步。" },
            { id: 59, term: "不求甚解", definition: "成語。原指讀書只求領會精神，不拘泥於字句。現多指學習或做事不認真，只求略懂皮毛。", sentence1: "他做學問總是不求甚解，因此常常犯下基礎的錯誤。", sentence2: "閱讀經典名著若只是不求甚解地翻閱，就無法體會其中的精髓。", scene: "現多指學習或做事不認真，只求略懂皮毛。" },
            { id: 60, term: "不知不覺", definition: "成語。沒有察覺、沒有意識到。", sentence1: "聊著聊著，不知不覺就到了深夜。", sentence2: "在他悉心的照顧下，她的病情不知不覺地好轉了。", scene: "沒有察覺、沒有意識到。" },
            { id: 61, term: "不苟言笑", definition: "成語。形容人態度嚴肅，不隨便說笑。", sentence1: "老校長平時不苟言笑，學生們都很怕他。", sentence2: "他外表雖然不苟言笑，但其實內心非常熱情。", scene: "形容人態度嚴肅，不隨便說笑。" },
            { id: 62, term: "不計其數", definition: "成語。無法計算其數目。形容數量極多。", sentence1: "這次地震造成的財產損失不計其數。", sentence2: "天上的星星不計其數，讓人感到宇宙的浩瀚。", scene: "無法計算其數目。形容數量極多。" },
            { id: 63, term: "不患人之不己知，患不知人也", definition: "語錄 (出自《論語》)。不怕別人不了解自己，只怕自己不了解別人。", sentence1: "君子應當有「不患人之不己知，患不知人也」的胸襟，多去體諒他人。", sentence2: "與其抱怨老闆不賞識你，不如秉持「不患人之不己知」的精神，先提升自己的能力。", scene: "不怕別人不了解自己，只怕自己不了解別人。" },
            { id: 64, term: "不虛偽的朋友還不如公開的敵人", definition: "語錄。指當面一套背後一套的虛偽朋友，比明著對抗的敵人更具威脅性與破壞力。", sentence1: "經歷過背叛後，他才明白不虛偽的朋友還不如公開的敵人這句話的重量。", sentence2: "寧可面對直接的競爭對手，也不要那些口蜜腹劍的人，因為不虛偽的朋友還不如公開的敵人。", scene: "指當面一套背後一套的虛偽朋友，比明著對抗的敵人更具威脅性與破壞力。" },
            { id: 65, term: "不費吹灰之力", definition: "成語。形容做事非常容易，毫不費力。", sentence1: "對於數學天才的他來說，解開這道難題簡直是不費吹灰之力。", sentence2: "大力士不費吹灰之力就把那塊大石頭搬開了。", scene: "形容做事非常容易，毫不費力。" },
            { id: 66, term: "不道不善言，不說不實話", definition: "語錄/警句。不說惡毒、傷人的話，也不說虛假、騙人的謊言。強調言行端正。", sentence1: "教育孩子要從口德做起，教導他們不道不善言，不說不實話。", sentence2: "他為人正直，一向秉持不道不善言，不說不實話的原則。", scene: "不說惡毒、傷人的話，也不說虛假、騙人的謊言。強調言行端正。" },
            { id: 67, term: "不廣求，故得；不雜學，故明", definition: "語錄。學習不貪多求廣，反而能真正有所得；不雜亂學習，才能專精明瞭。", sentence1: "做學問貴在專一，正所謂不廣求，故得；不雜學，故明。", sentence2: "他一生只專注於研究一種植物，最終成為權威，印證了不雜學，故明的道理。", scene: "學習不貪多求廣，反而能真正有所得；不雜亂學習，才能專精明瞭。" },
            { id: 68, term: "不遺餘力", definition: "成語。毫不保留地用盡全力。", sentence1: "為了幫助災民重建家園，社會各界都不遺餘力地提供援助。", sentence2: "他在推廣環保理念上不遺餘力，舉辦了無數場演講。", scene: "毫不保留地用盡全力。" },
            { id: 69, term: "井蛙之見", definition: "成語。比喻見識淺薄狹隘。", sentence1: "他從未出過國，對世界局勢的看法難免流於井蛙之見。", sentence2: "我們應該多讀書多旅行，才不會抱持著井蛙之見看事情。", scene: "比喻見識淺薄狹隘。" },
            { id: 70, term: "冗詞贅句", definition: "詞語。文章或言語中多餘、不必要的詞句。", sentence1: "這篇文章雖然長，但充滿了冗詞贅句，讓人抓不到重點。", sentence2: "編輯的任務就是刪除稿件中的冗詞贅句，讓文字更加精鍊。", scene: "文章或言語中多餘、不必要的詞句。" },
            { id: 71, term: "勿自矜炫耀，勿孤芳自賞", definition: "警句。勸人不要驕傲地炫耀自己的才能，也不要清高自傲、脫離群眾。", sentence1: "做人要謙虛，勿自矜炫耀，勿孤芳自賞，才能贏得他人的尊重。", sentence2: "他雖然才華洋溢，但謹記勿孤芳自賞的道理，很樂於與團隊合作。", scene: "勸人不要驕傲地炫耀自己的才能，也不要清高自傲、脫離群眾。" },
            { id: 72, term: "升官發財", definition: "詞語。職位晉升並獲得財富。", sentence1: "許多人汲汲營營，一生的目標只為了升官發財。", sentence2: "他不求升官發財，只希望能平平安安地過日子。", scene: "職位晉升並獲得財富。" },
            { id: 73, term: "天下無難事，只怕有心人", definition: "諺語。只要有決心和毅力，天下沒有無法克服的困難。", sentence1: "雖然學鋼琴很難，但天下無難事，只怕有心人，只要你肯練一定會進步。", sentence2: "國父革命十一次才成功，證明了天下無難事，只怕有心人。", scene: "只要有決心和毅力，天下沒有無法克服的困難。" },
            { id: 74, term: "天使的臉蛋，魔鬼的身材", definition: "流行語。形容女子容貌清純美麗，身材卻非常豐滿惹火。", sentence1: "這位模特兒擁有天使的臉蛋，魔鬼的身材，一出場就成為焦點。", sentence2: "雜誌封面上那位女星，被粉絲譽為擁有天使的臉蛋，魔鬼的身材。", scene: "形容女子容貌清純美麗，身材卻非常豐滿惹火。" },
            { id: 75, term: "天花亂墜", definition: "成語。形容說話極為動聽，但多浮誇不切實際。", sentence1: "詐騙集團把投資計畫說得天花亂墜，讓許多人上了當。", sentence2: "任憑推銷員說得天花亂墜，他依然不為所動。", scene: "形容說話極為動聽，但多浮誇不切實際。" },
            { id: 76, term: "天涯比鄰", definition: "成語。形容雖然相隔極遠，但情誼深厚，感覺就像近鄰一樣。", sentence1: "透過網際網路，即使朋友身在國外，也能有天涯比鄰的感覺。", sentence2: "我們雖然分隔兩地，但深厚的友誼讓我們宛如天涯比鄰。", scene: "形容雖然相隔極遠，但情誼深厚，感覺就像近鄰一樣。" },
            { id: 77, term: "太史公", definition: "詞語/借代。指漢代史學家司馬遷，或借指其所著之《史記》。", sentence1: "太史公忍辱負重，才完成了流傳千古的《史記》。", sentence2: "讀太史公的文字，總能感受到那股波瀾壯闊的歷史氣息。", scene: "指漢代史學家司馬遷，或借指其所著之《史記》。" },
            { id: 78, term: "引經據典", definition: "成語。引用經典或古代故事作為說理的依據。", sentence1: "他在演講時常常引經據典，顯得學識非常淵博。", sentence2: "寫論說文時若能適當地引經據典，可以增加文章的說服力。", scene: "引用經典或古代故事作為說理的依據。" },
            { id: 79, term: "心不在焉", definition: "成語。心思不集中，心裡想著別的事情。", sentence1: "他上課時心不在焉，連老師叫他也沒聽見。", sentence2: "聽他說話心不在焉的樣子，就知道他根本沒把這件事放在心上。", scene: "心思不集中，心裡想著別的事情。" },
            { id: 80, term: "心有靈犀", definition: "成語。比喻雙方心意相通，彼此不用言語就能了解對方的想法。", sentence1: "他們夫妻倆心有靈犀，往往一個眼神就能明白對方的意思。", sentence2: "在雙打比賽中，這對搭檔心有靈犀，配合得天衣無縫。", scene: "比喻雙方心意相通，彼此不用言語就能了解對方的想法。" },
            { id: 81, term: "心知肚明", definition: "成語。心裡明白得一清二楚，只是不說出來而已。", sentence1: "其實大家對他貪汙的事情都心知肚明，只是不敢聲張。", sentence2: "這次比賽誰作弊，裁判其實心知肚明。", scene: "心裡明白得一清二楚，只是不說出來而已。" },
            { id: 82, term: "水一激就向上逆流，火一激就星星橫飛，話一激就禍亂齊起", definition: "諺語/警句。比喻言語刺激容易引發嚴重的衝突與災禍，勸人說話應謹慎，不可用激將法傷人。", sentence1: "溝通時千萬要心平氣和，要知道話一激就禍亂齊起。", sentence2: "他因為一時氣憤說了重話，結果引發了鬥毆，真是水一激就逆流，話一激就惹禍。", scene: "比喻言語刺激容易引發嚴重的衝突與災禍，勸人說話應謹慎，不可用激將法傷人。" },
            { id: 83, term: "水波蕩漾", definition: "詞語。形容水面起伏微動的樣子。", sentence1: "微風吹過湖面，引起一陣陣的水波蕩漾。", sentence2: "月光照在水波蕩漾的江面上，景色十分迷人。", scene: "形容水面起伏微動的樣子。" },
            { id: 84, term: "水能載舟，亦能覆舟", definition: "諺語/典故。水能讓船航行，也能使船翻覆。比喻事物有利有弊；也比喻人民能擁護統治者，也能推翻統治者。", sentence1: "科技的發展水能載舟，亦能覆舟，我們必須謹慎運用。", sentence2: "政府應當傾聽民意，因為水能載舟，亦能覆舟。", scene: "水能讓船航行，也能使船翻覆。比喻事物有利有弊；也比喻人民能擁護統治者，也能推翻統治者。" },
            { id: 85, term: "水噹噹", definition: "詞語 (源自閩南語)。形容人或事物非常漂亮、美麗。", sentence1: "她今天穿了一件新洋裝，打扮得水噹噹的。", sentence2: "經過整修後，這座老公園變得水噹噹，吸引了許多遊客。", scene: "形容人或事物非常漂亮、美麗。" },
            { id: 86, term: "牛角掛書", definition: "典故。隋代李密騎牛出門時，把書掛在牛角上，邊走邊讀。比喻勤勉讀書。", sentence1: "他每天通勤時都不忘閱讀，真有古人牛角掛書的精神。", sentence2: "為了準備國考，他展現了牛角掛書的毅力，把握每一分鐘學習。", scene: "比喻勤勉讀書。" },
            { id: 87, term: "牛牽到北京也是牛", definition: "諺語。比喻人的本性難移，不管換到什麼環境都不會改變。", sentence1: "他那暴躁的脾氣，真是牛牽到北京也是牛，怎麼勸都沒用。", sentence2: "別以為把他送出國留學就會變乖，牛牽到北京也是牛啊！", scene: "比喻人的本性難移，不管換到什麼環境都不會改變。" },
            { id: 88, term: "他鄉遇故知", definition: "成語。在遠離家鄉的地方遇到了老朋友。形容極為難得的喜悅。", sentence1: "在紐約街頭偶然遇見大學同學，真有他鄉遇故知的驚喜。", sentence2: "「久旱逢甘雨，他鄉遇故知」被古人視為人生四大喜事之一。", scene: "在遠離家鄉的地方遇到了老朋友。形容極為難得的喜悅。" },
            { id: 89, term: "代父從軍的花木蘭", definition: "典故。北朝民歌《木蘭辭》中，花木蘭代替年老的父親上戰場的故事。比喻女子勇敢盡孝、巾幗不讓鬚眉。", sentence1: "在這部戲裡，她飾演那位代父從軍的花木蘭，展現了無比的英姿。", sentence2: "她獨自扛起家計的堅強，就像現代版代父從軍的花木蘭。", scene: "比喻女子勇敢盡孝、巾幗不讓鬚眉。" },
            { id: 90, term: "代為說項", definition: "典故。唐代項斯未出名時，楊敬之到處為他宣揚。後比喻替別人說好話或代為請求。", sentence1: "這次能順利升遷，多虧了經理在總經理面前代為說項。", sentence2: "為了幫朋友度過難關，他到處奔走，向長輩們代為說項。", scene: "後比喻替別人說好話或代為請求。" },
            { id: 91, term: "以子之矛，攻子之盾", definition: "成語/典故。用你的矛來刺你的盾。比喻用對方的話或行為來反駁對方，使其自相矛盾。", sentence1: "辯論時，他巧妙地以子之矛，攻子之盾，讓對手啞口無言。", sentence2: "你昨天說要早睡，今天又說熬夜沒關係，這不是以子之矛，攻子之盾嗎？", scene: "比喻用對方的話或行為來反駁對方，使其自相矛盾。" },
            { id: 92, term: "以其人之道，還治其人之身", definition: "成語。用對付別人的方法，反過來對付他自己。", sentence1: "既然他用這種卑劣的手段競爭，我們也可以以其人之道，還治其人之身。", sentence2: "面對詐騙集團，警方決定以其人之道，還治其人之身，設下陷阱將他們逮捕。", scene: "用對付別人的方法，反過來對付他自己。" },
            { id: 93, term: "以訛傳訛", definition: "成語。把本來就不正確的話，又錯誤地傳播出去，越傳越錯。", sentence1: "這種沒有根據的消息，大家不要以訛傳訛，以免造成恐慌。", sentence2: "網路上的假新聞往往就是這樣以訛傳訛，最後變成大家深信不疑的「真相」。", scene: "把本來就不正確的話，又錯誤地傳播出去，越傳越錯。" },
            { id: 94, term: "以管窺天", definition: "成語。透過竹管看天。比喻見識狹隘，只看到事物的一小部分。", sentence1: "若不深入研究就下結論，無異於以管窺天，無法了解全貌。", sentence2: "他的觀點只是以管窺天，完全忽視了整體市場的變化。", scene: "比喻見識狹隘，只看到事物的一小部分。" },
            { id: 95, term: "凸槌", definition: "詞語 (源自閩南語)。指發生失誤、出差錯。", sentence1: "他在這麼重要的簡報中居然凸槌了，讓老闆很不高興。", sentence2: "魔術師表演時不小心凸槌，被觀眾看穿了手法。", scene: "指發生失誤、出差錯。" },
            { id: 96, term: "出洋相", definition: "詞語。在眾人面前出醜、鬧笑話。", sentence1: "他因為不熟悉當地的禮儀，在晚宴上出了洋相。", sentence2: "喝醉酒後，他在街上大呼小叫，真是出盡了洋相。", scene: "在眾人面前出醜、鬧笑話。" },
            { id: 97, term: "出頭天", definition: "詞語 (源自閩南語)。指擺脫困境，獲得成功或發展的機會。", sentence1: "經過多年的苦熬，他終於盼到了出頭天的日子。", sentence2: "只要肯努力打拼，總有一天會出頭天的。", scene: "指擺脫困境，獲得成功或發展的機會。" },
            { id: 98, term: "出籠的鳥兒難收回，說話過頭難收回", definition: "諺語。比喻話一說出口，就像飛出籠子的鳥一樣無法收回，勸人謹言慎行。", sentence1: "生氣時最好先深呼吸，要知道說話過頭難收回，別傷了和氣。", sentence2: "昨天那句氣話讓他懊悔不已，真應了出籠的鳥兒難收回的道理。", scene: "比喻話一說出口，就像飛出籠子的鳥一樣無法收回，勸人謹言慎行。" },
            { id: 99, term: "加官進祿", definition: "成語。晉升官職，增加俸祿。比喻獲得升遷與財富。", sentence1: "長官對他的表現非常滿意，預計年底就會讓他加官進祿。", sentence2: "祝您在新的一年裡步步高升、加官進祿！", scene: "比喻獲得升遷與財富。" },
            { id: 100, term: "去梯言", definition: "典故。三國時期劉琦為求自保，請諸葛亮上樓後抽去樓梯，以求得極機密的建議。比喻極為機密的言論。", sentence1: "兩人關在密室裡談判，句句都是去梯言，外人無從得知。", sentence2: "他把我拉到角落，告訴我這是一番去梯言，千萬不可洩漏給第三人。", scene: "比喻極為機密的言論。" },
            { id: 101, term: "只可意會，不可言傳", definition: "成語。只能用心領會，無法用言語表達出來。", sentence1: "這種藝術的最高境界只可意會，不可言傳。", sentence2: "兩人之間的默契只可意會，不可言傳，旁人很難懂。", scene: "只能用心領會，無法用言語表達出來。" },
            { id: 102, term: "只有為別人而活，生命才有價值", definition: "愛因斯坦語錄。強調奉獻與利他精神，認為幫助他人能賦予生命真正的意義。", sentence1: "志工們秉持著「只有為別人而活，生命才有價值」的信念，無私地奉獻。", sentence2: "他將一生奉獻給偏鄉教育，完美詮釋了只有為別人而活，生命才有價值。", scene: "強調奉獻與利他精神，認為幫助他人能賦予生命真正的意義。" },
            { id: 103, term: "失之東隅，收之桑榆", definition: "成語/典故。比喻雖然先在某一方面有損失，但終在另一方面有成就。", sentence1: "這次比賽雖然沒得名，但結交了許多好友，也算是失之東隅，收之桑榆。", sentence2: "投資失敗後他轉行寫作反而大受歡迎，真是失之東隅，收之桑榆。", scene: "比喻雖然先在某一方面有損失，但終在另一方面有成就。" },
            { id: 104, term: "左耳入，右耳出", definition: "諺語。形容把別人的話當作耳邊風，聽過就忘，毫不理會。", sentence1: "媽媽的叮嚀他總是左耳入，右耳出，根本沒放在心上。", sentence2: "老師講的重點你如果左耳入，右耳出，考試肯定不及格。", scene: "形容把別人的話當作耳邊風，聽過就忘，毫不理會。" },
            { id: 105, term: "巧舌如簧", definition: "成語。形容人言辭巧妙動聽，猶如笙中之簧，多指花言巧語。", sentence1: "那個推銷員巧舌如簧，把劣質品說得像稀世珍寶。", sentence2: "儘管他巧舌如簧，大家還是看穿了他的真面目。", scene: "形容人言辭巧妙動聽，猶如笙中之簧，多指花言巧語。" },
            { id: 106, term: "巧婦難為無米之炊", definition: "諺語。比喻即使再能幹，若缺乏必要的條件或資源，也無法把事情辦好。", sentence1: "公司完全不給預算，要我辦一場大型活動，簡直是巧婦難為無米之炊。", sentence2: "廚師雖然廚藝高超，但沒有新鮮食材，也是巧婦難為無米之炊。", scene: "比喻即使再能幹，若缺乏必要的條件或資源，也無法把事情辦好。" },
            { id: 107, term: "打拚", definition: "詞語 (源自閩南語)。指努力工作、奮鬥。", sentence1: "為了讓家人過上好日子，他在外地辛苦打拚。", sentence2: "年輕人要有打拚的精神，才能創造自己的事業。", scene: "指努力工作、奮鬥。" },
            { id: 108, term: "打開天窗說亮話", definition: "諺語。比喻毫無隱瞞，直接把話說清楚。", sentence1: "大家都是自己人，我們就打開天窗說亮話，別拐彎抹角了。", sentence2: "既然事情已經發生，不如打開天窗說亮話，共同尋求解決之道。", scene: "比喻毫無隱瞞，直接把話說清楚。" },
            { id: 109, term: "玉樹臨風", definition: "成語。形容男子姿態俊秀，風度翩翩。", sentence1: "他穿上這套西裝，更顯得玉樹臨風，吸引了眾人的目光。", sentence2: "那位年輕演員玉樹臨風的氣質，讓他贏得了許多粉絲的喜愛。", scene: "形容男子姿態俊秀，風度翩翩。" },
            { id: 110, term: "瓜瓞綿綿", definition: "成語。比喻子孫繁衍，代代不絕。", sentence1: "在爺爺的壽宴上，大家祝他福如東海、瓜瓞綿綿。", sentence2: "這個家族歷史悠久，瓜瓞綿綿，子孫遍布海內外。", scene: "比喻子孫繁衍，代代不絕。" },
            { id: 111, term: "生死攸關", definition: "成語。關係到人的生存和死亡。形容事情極為重要、危急。", sentence1: "在這生死攸關的時刻，我們必須保持冷靜，才能找出活路。", sentence2: "手術台上的每一秒都是生死攸關的，醫生不敢有絲毫大意。", scene: "關係到人的生存和死亡。形容事情極為重要、危急。" },
            { id: 112, term: "生於斯，長於斯", definition: "詞語/名句。在這裡出生，也在這裡長大。形容對故鄉或所在地的深厚感情。", sentence1: "我生於斯，長於斯，對這片土地有著無法割捨的熱愛。", sentence2: "老先生感慨地說：「我生於斯，長於斯，也希望能長眠於此。」", scene: "在這裡出生，也在這裡長大。形容對故鄉或所在地的深厚感情。" },
            { id: 113, term: "白手起家", definition: "成語。形容在沒有任何基礎和條件下，完全靠自己的力量創立一番事業。", sentence1: "他當年隻身來到大城市，靠著打零工白手起家，如今已是大企業家。", sentence2: "白手起家雖然辛苦，但獲得的成就感是無法言喻的。", scene: "形容在沒有任何基礎和條件下，完全靠自己的力量創立一番事業。" },
            { id: 114, term: "目光如豆", definition: "成語。形容目光短淺，見識狹隘。", sentence1: "他為了眼前的蠅頭小利而放棄了長遠的合作，真是目光如豆。", sentence2: "身為領導者，絕對不能目光如豆，必須具備宏觀的視野。", scene: "形容目光短淺，見識狹隘。" },
            { id: 115, term: "先入為主", definition: "成語。指先接受的意見或印象會佔據主導地位，使人難以再接受不同的意見。", sentence1: "面試官對他的第一印象不好，產生了先入為主的偏見。", sentence2: "我們在了解事情真相前，不應有先入為主的觀念。", scene: "指先接受的意見或印象會佔據主導地位，使人難以再接受不同的意見。" },
            { id: 116, term: "先知先覺", definition: "成語。指對事物的發展變化有敏銳的洞察力，能預先察覺。", sentence1: "他在股市崩盤前就已經獲利了結，真是一位先知先覺的投資者。", sentence2: "時代的進步往往需要那些先知先覺的人來引領。", scene: "指對事物的發展變化有敏銳的洞察力，能預先察覺。" },
            { id: 117, term: "光天化日", definition: "成語。形容大白天，也比喻在大庭廣眾之下，毫無隱蔽。", sentence1: "歹徒竟然在光天化日之下搶劫，實在太囂張了。", sentence2: "這種見不得人的勾當，怎敢在光天化日之下進行？", scene: "形容大白天，也比喻在大庭廣眾之下，毫無隱蔽。" },
            { id: 118, term: "全身長滿刺的孔雀", definition: "比喻/網路用語。形容人雖然外表美麗或才華洋溢，但性格卻防備心重、難以親近或容易傷人。", sentence1: "她就像隻全身長滿刺的孔雀，雖然漂亮卻讓人不敢靠近。", sentence2: "職場上遇到這種全身長滿刺的孔雀，還是保持適當的距離為妙。", scene: "形容人雖然外表美麗或才華洋溢，但性格卻防備心重、難以親近或容易傷人。" },
            { id: 119, term: "全家就是你家", definition: "廣告用語/流行語。比喻像在自己家一樣舒適、方便，充滿親切感。", sentence1: "這間民宿老闆熱情款待，真有「全家就是你家」的溫馨感。", sentence2: "便利商店提供多項便民服務，完美落實了全家就是你家的口號。", scene: "比喻像在自己家一樣舒適、方便，充滿親切感。" },
            { id: 120, term: "吃得苦中苦，方為人上人", definition: "諺語。必須忍受極大的艱難困苦，才能成為傑出的人才。", sentence1: "父母常勉勵他要勤奮向學，畢竟吃得苦中苦，方為人上人。", sentence2: "他能有今天的成就，完全印證了吃得苦中苦，方為人上人的道理。", scene: "必須忍受極大的艱難困苦，才能成為傑出的人才。" },
            { id: 121, term: "吃著碗裡，看著鍋裡", definition: "諺語。比喻貪得無厭，不知滿足，擁有了一部分還想要更多。", sentence1: "他已經有了一個好工作，卻還一直想跳槽，真是吃著碗裡，看著鍋裡。", sentence2: "在感情中，吃著碗裡，看著鍋裡的態度是絕對不被允許的。", scene: "比喻貪得無厭，不知滿足，擁有了一部分還想要更多。" },
            { id: 122, term: "吉人之辭寡，躁人之辭多", definition: "語錄 (出自《易經》)。吉祥、有修養的人話語少且謹慎；急躁、不穩重的人話語多且繁雜。", sentence1: "老一輩常說「吉人之辭寡，躁人之辭多」，勸人說話要沉穩。", sentence2: "從他們兩人的談吐就能看出，吉人之辭寡，躁人之辭多。", scene: "吉祥、有修養的人話語少且謹慎；急躁、不穩重的人話語多且繁雜。" },
            { id: 123, term: "多言則必失，不如其約也", definition: "語錄/警句。話說多了必定會有失誤，不如少說些為妙。", sentence1: "會議上發言應切中要害，多言則必失，不如其約也。", sentence2: "為了避免惹禍上身，他始終信奉「多言則必失，不如其約也」的原則。", scene: "話說多了必定會有失誤，不如少說些為妙。" },
            { id: 124, term: "多門之室生風，多口之人生禍", definition: "諺語/警句。門多的房間容易灌風，話多的人容易惹禍。勸戒人要謹言慎行。", sentence1: "俗話說多門之室生風，多口之人生禍，保守秘密才是明智之舉。", sentence2: "他因為到處散播謠言而吃上官司，真是多門之室生風，多口之人生禍。", scene: "門多的房間容易灌風，話多的人容易惹禍。勸戒人要謹言慎行。" },
            { id: 125, term: "多聞其過，不欲聞其喜", definition: "語錄。喜歡多聽別人指出自己的過失，不喜歡聽別人阿諛奉承的話。形容虛心受教。", sentence1: "明智的君主應該多聞其過，不欲聞其喜，才能使國家強盛。", sentence2: "他為人謙虛，總要求部屬直言進諫，做到了多聞其過，不欲聞其喜。", scene: "喜歡多聽別人指出自己的過失，不喜歡聽別人阿諛奉承的話。形容虛心受教。" },
            { id: 126, term: "多嘴饒舌", definition: "成語。形容人話多，喜歡插嘴或搬弄是非。", sentence1: "她平時就喜歡多嘴饒舌，所以大家都不太喜歡把秘密告訴她。", sentence2: "處理這件糾紛時，旁人最好不要多嘴饒舌，以免越幫越忙。", scene: "形容人話多，喜歡插嘴或搬弄是非。" },
            { id: 127, term: "夸夸其談", definition: "成語。形容說話浮誇，不切實際。", sentence1: "他在台上夸夸其談自己的豐功偉業，台下卻沒人相信。", sentence2: "與其夸夸其談，不如腳踏實地做出成績給大家看。", scene: "形容說話浮誇，不切實際。" },
            { id: 128, term: "好論人長短，學者之大病", definition: "語錄。喜歡評論別人的優缺點或是非，是做學問的人最大的毛病。", sentence1: "做學問要專注於自身修養，要知道好論人長短，學者之大病。", sentence2: "老師時常告誡我們，好論人長短，學者之大病，切勿成為八卦製造者。", scene: "喜歡評論別人的優缺點或是非，是做學問的人最大的毛病。" },
            { id: 129, term: "如人飲水，冷暖自知", definition: "諺語/成語。比喻必須親身經歷，才能真正體會其中的感受。", sentence1: "婚姻生活如人飲水，冷暖自知，外人是很難評斷的。", sentence2: "這份工作的辛苦，真是如人飲水，冷暖自知啊。", scene: "比喻必須親身經歷，才能真正體會其中的感受。" },
            { id: 130, term: "如膠似漆", definition: "成語。像膠和漆一樣黏結。形容感情極為深厚，難以分開。", sentence1: "這對新婚夫妻感情如膠似漆，總是形影不離。", sentence2: "他們兩兄弟從小就如膠似漆，感情好得不得了。", scene: "像膠和漆一樣黏結。形容感情極為深厚，難以分開。" },
            { id: 131, term: "如醉如痴", definition: "成語。形容對某種事物極度沉迷、陶醉，甚至失去理智。", sentence1: "他聽著這首優美的交響樂，已經到了如醉如痴的地步。", sentence2: "觀眾被台上精湛的舞蹈表演迷得如醉如痴。", scene: "形容對某種事物極度沉迷、陶醉，甚至失去理智。" },
            { id: 132, term: "妄自尊大", definition: "成語。狂妄地自高自大，看不起別人。", sentence1: "他才剛有點成績就妄自尊大，早晚會栽跟頭。", sentence2: "做人要謙虛，千萬不可妄自尊大，否則會惹人反感。", scene: "狂妄地自高自大，看不起別人。" },
            { id: 133, term: "守口如瓶", definition: "成語。嘴巴像瓶口一樣封得嚴密。比喻嚴守秘密，不輕易透露。", sentence1: "對於公司的商業機密，每個員工都必須守口如瓶。", sentence2: "答應別人的事，我一定會守口如瓶，絕不洩漏半個字。", scene: "嘴巴像瓶口一樣封得嚴密。比喻嚴守秘密，不輕易透露。" },
            { id: 134, term: "成功的祕訣在於：當機會來臨時，你已準備妥當", definition: "語錄。強調平時要累積實力，才能在機會出現時及時把握。", sentence1: "他能順利爭取到這個外派名額，是因為成功的祕訣在於：當機會來臨時，你已準備妥當。", sentence2: "平時多充實自己，因為成功的祕訣在於：當機會來臨時，你已準備妥當。", scene: "強調平時要累積實力，才能在機會出現時及時把握。" },
            { id: 135, term: "有恆為成功之本", definition: "語錄/警句。持之以恆是取得成功的根本基礎。", sentence1: "無論學習什麼技能，都必須明白有恆為成功之本的道理。", sentence2: "減肥沒有捷徑，有恆為成功之本，持續運動才是王道。", scene: "持之以恆是取得成功的根本基礎。" },
            { id: 136, term: "有條不紊", definition: "成語。形容做事或說話有條理，一點也不亂。", sentence1: "面對突如其來的危機，他依然能有條不紊地指揮大家應變。", sentence2: "她的筆記做得有條不紊，複習起來非常方便。", scene: "形容做事或說話有條理，一點也不亂。" },
            { id: 137, term: "有理走遍天下，無理寸步難行", definition: "諺語。只要有道理，走到哪裡都行得通；沒有道理，則處處碰壁。", sentence1: "你不用怕他威脅，有理走遍天下，無理寸步難行，法律會保護你的。", sentence2: "我們做事要講求正義，畢竟有理走遍天下，無理寸步難行。", scene: "只要有道理，走到哪裡都行得通；沒有道理，則處處碰壁。" },
            { id: 138, term: "有緣千里來相會，無緣對面不相識", definition: "諺語。指人與人之間的相遇與交往，全憑緣分。", sentence1: "兩個不同國家的年輕人竟然在旅途中相戀，真是有緣千里來相會。", sentence2: "雖然他們住同一個社區卻從未交談，真可謂無緣對面不相識。", scene: "指人與人之間的相遇與交往，全憑緣分。" },
            { id: 139, term: "汗青", definition: "詞語/借代。古代用竹簡書寫，烤竹去水分叫「汗青」。後借代為史冊、歷史。", sentence1: "文天祥在《過零丁洋》中寫下「留取丹心照汗青」，表達了名垂史冊的決心。", sentence2: "他的英勇事蹟將會被載入汗青，流芳百世。", scene: "古代用竹簡書寫，烤竹去水分叫「汗青」。後借代為史冊、歷史。" },
            { id: 140, term: "百里侯", definition: "詞語/借代。古稱治理百里之地的諸侯，現代多用來借代縣市首長。", sentence1: "這次的地方選舉，各黨派都推出了優秀的人選來角逐百里侯。", sentence2: "身為百里侯，他時常下鄉傾聽民意，解決縣民的困難。", scene: "古稱治理百里之地的諸侯，現代多用來借代縣市首長。" },
            { id: 141, term: "百般呵護", definition: "成語。形容用盡各種方法來愛護、照顧。", sentence1: "父母對這剛出生的嬰兒百般呵護，深怕他受一點委屈。", sentence2: "那盆珍貴的蘭花在主人的百般呵護下，終於開出了美麗的花朵。", scene: "形容用盡各種方法來愛護、照顧。" },
            { id: 142, term: "百善孝為先", definition: "諺語。所有的善行中，以孝順父母為最優先、最重要的。", sentence1: "學校教育我們百善孝為先，要懂得感恩父母的養育之恩。", sentence2: "他雖然工作忙碌，但每個週末都會回家探望父母，深知百善孝為先的道理。", scene: "所有的善行中，以孝順父母為最優先、最重要的。" },
            { id: 143, term: "老神在在", definition: "詞語 (源自閩南語)。形容遇到突發狀況時，依然從容不迫、很有把握的樣子。", sentence1: "明天就要期末考了，大家都急得像熱鍋上的螞蟻，只有他還老神在在。", sentence2: "對手氣勢洶洶地殺來，教練卻老神在在地指示球員防守。", scene: "形容遇到突發狀況時，依然從容不迫、很有把握的樣子。" },
            { id: 144, term: "老當益壯", definition: "成語。年紀雖老，但志氣和身體卻更加強壯。", sentence1: "爺爺雖然已經八十歲了，但每天還去爬山，真是老當益壯。", sentence2: "這些老榮民退而不休，老當益壯，持續為社會擔任志工。", scene: "年紀雖老，但志氣和身體卻更加強壯。" },
            { id: 145, term: "耳順之年", definition: "詞語/借代。指六十歲。語出《論語》「六十而耳順」。", sentence1: "伯父今年剛滿耳順之年，家人特地為他辦了一場盛大的壽宴。", sentence2: "到了耳順之年，他對人生的起伏已經能用平常心來看待。", scene: "指六十歲。語出《論語》「六十而耳順」。" },
            { id: 146, term: "自甘墮落", definition: "成語。自己甘願放棄努力，走向敗壞的地步。", sentence1: "遇到挫折就借酒澆愁，這種自甘墮落的行為是不會得到同情的。", sentence2: "他本來大有可為，卻結交壞朋友而自甘墮落，令人惋惜。", scene: "自己甘願放棄努力，走向敗壞的地步。" },
            { id: 147, term: "自吹自擂", definition: "成語。自己吹喇叭，自己打鼓。比喻自我吹噓。", sentence1: "他總是喜歡在別人面前自吹自擂，說自己有多了不起。", sentence2: "真正有實力的人不會到處自吹自擂，而是用行動證明。", scene: "自己吹喇叭，自己打鼓。比喻自我吹噓。" },
            { id: 148, term: "自我設限", definition: "詞語。自己給自己設定界限，限制了自己的潛能與發展。", sentence1: "學習新事物時千萬不要自我設限，覺得自己一定做不到。", sentence2: "只有打破自我設限的框架，企業才能尋求更大的突破。", scene: "自己給自己設定界限，限制了自己的潛能與發展。" },
            { id: 149, term: "舌尖上沾一點蜜，讓滿口都是甜的；舌尖上沾一點愛心，讓口邊都是春風", definition: "語錄/警句。比喻說話要溫和甜美、充滿善意，才能帶給別人溫暖。", sentence1: "人際交往中，記得「舌尖上沾一點蜜」，多說讚美的話能拉近距離。", sentence2: "她總是笑臉迎人，說話就像「舌尖上沾一點愛心，讓口邊都是春風」。", scene: "比喻說話要溫和甜美、充滿善意，才能帶給別人溫暖。" },
            { id: 150, term: "舌粲蓮花", definition: "成語。形容口才極好，說話極其動聽。", sentence1: "這位銷售員舌粲蓮花，不知不覺就讓人買下了一堆商品。", sentence2: "在辯論賽中，他舌粲蓮花地闡述自己的觀點，贏得滿堂喝采。", scene: "形容口才極好，說話極其動聽。" },
            { id: 151, term: "行百里者半於九十", definition: "諺語/典故。走一百里路，走到了九十里才算走了一半。比喻事情越接近成功越困難，越要堅持到底。", sentence1: "專案到了最後階段絕不能鬆懈，要知道行百里者半於九十。", sentence2: "馬拉松跑到最後幾公里是最痛苦的，正所謂行百里者半於九十，撐過去就是贏家。", scene: "走一百里路，走到了九十里才算走了一半。比喻事情越接近成功越困難，越要堅持到底。" },
            { id: 152, term: "行雲流水", definition: "成語。形容文章自然流暢，毫無造作；或比喻武術、動作等連貫順暢。", sentence1: "這篇散文寫得行雲流水，讀起來令人心曠神怡。", sentence2: "他的太極拳打得如行雲流水般，非常具有美感。", scene: "形容文章自然流暢，毫無造作；或比喻武術、動作等連貫順暢。" },
            { id: 153, term: "伯樂一顧", definition: "典故。比喻得到名人的賞識、推薦而身價倍增。", sentence1: "只要能得到那位大導演的伯樂一顧，這位新人絕對能爆紅。", sentence2: "他的畫作原本無人問津，經過大師的伯樂一顧後，立刻被高價收購。", scene: "比喻得到名人的賞識、推薦而身價倍增。" },
            { id: 154, term: "伶牙俐齒", definition: "成語。形容人聰明乖巧，口齒伶俐，能言善道。", sentence1: "那個小女孩伶牙俐齒，把大人逗得哈哈大笑。", sentence2: "辯護律師伶牙俐齒，在法庭上為被告爭取到了最有利的判決。", scene: "形容人聰明乖巧，口齒伶俐，能言善道。" },
            { id: 155, term: "作繭自縛", definition: "成語。蠶吐絲結繭，把自己包在裡面。比喻自己設定的限制或做的事反而使自己陷入困境。", sentence1: "他當初為了省錢用了劣質材料，現在產品常出問題，真是作繭自縛。", sentence2: "你撒了一個謊，就要用無數個謊去圓，最終只會作繭自縛。", scene: "蠶吐絲結繭，把自己包在裡面。比喻自己設定的限制或做的事反而使自己陷入困境。" },
            { id: 156, term: "別來無恙", definition: "成語。用作久別重逢時的問候語，意思是自從分別以來，一切都還好嗎？", sentence1: "多年不見，老同學一見面就互道：「別來無恙？」", sentence2: "收到故友的來信，開頭一句「別來無恙」讓我感到格外親切。", scene: "用作久別重逢時的問候語，意思是自從分別以來，一切都還好嗎？" },
            { id: 157, term: "利人利己", definition: "成語。對別人有好處，對自己也有好處。", sentence1: "隨手關燈不僅能節能減碳，還能省電費，是一件利人利己的好事。", sentence2: "這種合作模式能達到雙贏的局面，絕對是利人利己的。", scene: "對別人有好處，對自己也有好處。" },
            { id: 158, term: "君子不以口譽人，則民盡忠勸善", definition: "語錄。君子不隨便用言語讚美人，如此民眾才會真正盡忠並互相勸勉行善。指讚美應當嚴謹、看重實質。", sentence1: "主管的稱讚必須建立在事實上，正所謂君子不以口譽人，則民盡忠勸善。", sentence2: "為了不讓部屬變得虛榮，他奉行「君子不以口譽人」的原則。", scene: "君子不隨便用言語讚美人，如此民眾才會真正盡忠並互相勸勉行善。指讚美應當嚴謹、看重實質。" },
            { id: 159, term: "君子之言寡而實，小人之言多而虛", definition: "語錄。君子的話少卻實在，小人的話多卻虛假。", sentence1: "評價一個人要看他的行動，畢竟君子之言寡而實，小人之言多而虛。", sentence2: "聽他說了半天卻毫無重點，真是應了君子之言寡而實，小人之言多而虛。", scene: "君子的話少卻實在，小人的話多卻虛假。" },
            { id: 160, term: "君子立恆志，小人恆立志", definition: "語錄。君子立定志向後會持之以恆；小人則常常改變志向，無法堅持。", sentence1: "想要成功就必須堅持到底，因為君子立恆志，小人恆立志。", sentence2: "他每年都發誓要減肥卻從未成功，典型的「小人恆立志」。", scene: "君子立定志向後會持之以恆；小人則常常改變志向，無法堅持。" },
            { id: 161, term: "君子有終身之憂", definition: "語錄 (出自《孟子》)。君子一輩子都擔憂自己品德不夠完善或無法造福天下。", sentence1: "國父孫中山先生為了國家前途奔走，真可謂君子有終身之憂。", sentence2: "他即使退休了依然關心社會議題，體現了君子有終身之憂的襟懷。", scene: "君子一輩子都擔憂自己品德不夠完善或無法造福天下。" },
            { id: 162, term: "君子役物，小人役於物", definition: "語錄 (出自《荀子》)。君子能支配和利用外物，小人則被物質欲望所奴役。", sentence1: "我們應該做金錢的主人，而不是財富的奴隸，正所謂君子役物，小人役於物。", sentence2: "沉迷於購買名牌包而負債累累，就是典型的「役於物」。", scene: "君子能支配和利用外物，小人則被物質欲望所奴役。" },
            { id: 163, term: "君子求諸己，小人求諸人", definition: "語錄 (出自《論語》)。君子遇到問題先反省自己，小人遇到問題總是怪罪別人。", sentence1: "專案失敗後，他主動承擔責任並檢討，展現了君子求諸己的風範。", sentence2: "發生車禍時他只會指責對方，完全忘了「君子求諸己，小人求諸人」的教誨。", scene: "君子遇到問題先反省自己，小人遇到問題總是怪罪別人。" },
            { id: 164, term: "君子言有信，而行之有恆", definition: "語錄。君子說話講求信用，做事有始有終、持之以恆。", sentence1: "做生意講求誠信，必須做到君子言有信，而行之有恆。", sentence2: "答應別人的事就要做到，因為君子言有信，而行之有恆。", scene: "君子說話講求信用，做事有始有終、持之以恆。" },
            { id: 165, term: "君子居其室，出其言善，則千里之外應之，況其邇者乎？居其室，出其言不善，則千里之外違之，況其邇者乎？", definition: "語錄 (出自《易經》)。君子在屋內說善言，千里之外的人也會響應；反之亦然。強調言論影響力極大。", sentence1: "領導者發言必須謹慎，要知道君子出其言善，則千里應之的道理。", sentence2: "網路時代，這句「出其言善，千里應之」的古訓更顯得真實。", scene: "君子在屋內說善言，千里之外的人也會響應；反之亦然。強調言論影響力極大。" },
            { id: 166, term: "君子動口，小人動手", definition: "諺語。有教養的人用講理來解決爭端，沒有教養的人才用暴力打架。", sentence1: "大家冷靜點，有話好好說，君子動口，小人動手，千萬別打起來。", sentence2: "面對對方的挑釁，他始終保持理智，認為君子動口，小人動手。", scene: "有教養的人用講理來解決爭端，沒有教養的人才用暴力打架。" },
            { id: 167, term: "坐以待斃", definition: "成語。坐著等待死亡。比喻遇到危難時不積極想辦法解決，只等著失敗。", sentence1: "既然公司已經面臨危機，我們就該主動出擊，絕對不能坐以待斃。", sentence2: "敵軍已經包圍了城市，難道我們要坐以待斃嗎？", scene: "坐著等待死亡。比喻遇到危難時不積極想辦法解決，只等著失敗。" },
            { id: 168, term: "坐而言不如起而行", definition: "諺語。與其光說不練，不如親自付諸行動。", sentence1: "這個計畫聽起來很棒，但坐而言不如起而行，趕快動手做吧！", sentence2: "空談理想是沒有用的，坐而言不如起而行，才是成功的關鍵。", scene: "與其光說不練，不如親自付諸行動。" },
            { id: 169, term: "坐擁書城", definition: "成語。形容擁有很多書籍，宛如坐在書堆砌成的城牆裡。", sentence1: "愛書如痴的他，家中四壁皆是書櫃，可說是坐擁書城。", sentence2: "每到假日，他最喜歡坐擁書城，享受閱讀的樂趣。", scene: "形容擁有很多書籍，宛如坐在書堆砌成的城牆裡。" },
            { id: 170, term: "妙筆生花", definition: "成語。比喻傑出的寫作才能，文章寫得極為生動出色。", sentence1: "李白的詩句宛如妙筆生花，流傳千古。", sentence2: "這位作家的文筆極好，妙筆生花，將人物描寫得栩栩如生。", scene: "比喻傑出的寫作才能，文章寫得極為生動出色。" },
            { id: 171, term: "妙語如珠", definition: "成語。形容說話極有文采、幽默有趣，就像一串串的珍珠。", sentence1: "主持人在台上妙語如珠，把觀眾逗得捧腹大笑。", sentence2: "這場演講中，講者妙語如珠的表達方式讓人印象深刻。", scene: "形容說話極有文采、幽默有趣，就像一串串的珍珠。" },
            { id: 172, term: "志意修，則驕富貴；道義重，則輕王公；內省則外物輕矣", definition: "語錄 (出自《荀子》)。心志修養好，就能看輕富貴；看重道義，就能不懼權貴；內心充實，外在物質就不重要。", sentence1: "古代許多隱士明白「志意修，則驕富貴」的道理，寧可過清貧的生活。", sentence2: "只有做到「內省則外物輕矣」，才不會在物欲橫流的社會中迷失自己。", scene: "心志修養好，就能看輕富貴；看重道義，就能不懼權貴；內心充實，外在物質就不重要。" },
            { id: 173, term: "我們有兩隻耳朵和一個嘴巴，目的在多聽少說", definition: "語錄。提醒人們傾聽比說話更重要。", sentence1: "溝通時別總是急著表達，記住我們有兩隻耳朵和一個嘴巴，目的在多聽少說。", sentence2: "優秀的領導者深知「多聽少說」的智慧，善於傾聽部屬的意見。", scene: "提醒人們傾聽比說話更重要。" },
            { id: 174, term: "旱鴨子", definition: "詞語。比喻不會游泳的人。", sentence1: "我從小就怕水，是個道地道地的旱鴨子。", sentence2: "去海邊玩水時，一定要特別注意那些旱鴨子的安全。", scene: "比喻不會游泳的人。" },
            { id: 175, term: "杜絕後患", definition: "成語。堵塞、消滅日後可能發生的禍患。", sentence1: "為了杜絕後患，警方決定將這個犯罪集團徹底瓦解。", sentence2: "簽訂合約時必須將條款寫清楚，才能杜絕後患，避免日後糾紛。", scene: "堵塞、消滅日後可能發生的禍患。" },
            { id: 176, term: "每接納一個孩子，就像釀一罈酒，要保持一顆開放的心", definition: "語錄/教育理念。強調教育需要耐心、包容，讓每個孩子依照自己的特質發育成熟。", sentence1: "身為老師，她深信「每接納一個孩子，就像釀一罈酒」，用心陪伴他們成長。", sentence2: "教育不是工廠流水線，而是像釀酒一樣需要等待和開放的心胸。", scene: "強調教育需要耐心、包容，讓每個孩子依照自己的特質發育成熟。" },
            { id: 177, term: "沉魚落雁", definition: "成語。魚見之沉入水底，雁見之降落沙洲。形容女子容貌極美。", sentence1: "她擁有沉魚落雁之貌，是大家公認的校花。", sentence2: "這位古代美女的容貌被形容為沉魚落雁、閉月羞花。", scene: "魚見之沉入水底，雁見之降落沙洲。形容女子容貌極美。" },
            { id: 178, term: "沉默是金，多言多敗", definition: "諺語/警句。保持沉默是最可貴的，話說多了容易出錯失敗。", sentence1: "遇到不懂的事情最好不要亂發表意見，畢竟沉默是金，多言多敗。", sentence2: "在這敏感的局勢下，官員們都深知沉默是金，多言多敗的道理。", scene: "保持沉默是最可貴的，話說多了容易出錯失敗。" },
            { id: 179, term: "沉默是金，雄辯是銀", definition: "諺語 (源自西方)。意指善於辯論雖然好，但懂得適時保持沉默卻更為珍貴。", sentence1: "面對無理的指責，他不發一語，完美展現了「沉默是金，雄辯是銀」的境界。", sentence2: "有時候無聲勝有聲，這就是為什麼人們常說沉默是金，雄辯是銀。", scene: "意指善於辯論雖然好，但懂得適時保持沉默卻更為珍貴。" },
            { id: 180, term: "沉默寡言", definition: "成語。指人不聲不響，很少說話。", sentence1: "他個性內向，平時總是沉默寡言，很少與人交談。", sentence2: "雖然他沉默寡言，但做事卻非常細心負責。", scene: "指人不聲不響，很少說話。" },
            { id: 181, term: "沒有經過反省的人生，是不值得活的人生", definition: "蘇格拉底語錄。強調自我覺察與反思對生命意義的重要性。", sentence1: "每天睡前我都會回顧一天的所作所為，因為沒有經過反省的人生，是不值得活的人生。", sentence2: "遭遇挫折時更要靜下心來思考，畢竟沒有經過反省的人生，是不值得活的人生。", scene: "強調自我覺察與反思對生命意義的重要性。" },
            { id: 182, term: "沒骨花卉", definition: "詞語 (國畫技法)。指不用墨線勾勒輪廓，直接用顏色點染而成的花卉畫法。", sentence1: "這幅沒骨花卉的畫作，色彩柔和，充滿了生機。", sentence2: "畫展中展出了許多清代名家的沒骨花卉作品。", scene: "指不用墨線勾勒輪廓，直接用顏色點染而成的花卉畫法。" },
            { id: 183, term: "良言一句三冬暖，惡語傷人六月寒", definition: "諺語。一句好話能讓人像在嚴冬中感到溫暖，一句惡言能讓人像在盛夏中感到心寒。", sentence1: "多給別人鼓勵吧，要知道良言一句三冬暖，惡語傷人六月寒。", sentence2: "他的冷嘲熱諷讓同事十分難過，真是惡語傷人六月寒。", scene: "一句好話能讓人像在嚴冬中感到溫暖，一句惡言能讓人像在盛夏中感到心寒。" },
            { id: 184, term: "良農不為水旱不耕，良賈不為折閱不市，士君子不為貧窮怠乎道", definition: "語錄 (出自《荀子》)。好農夫不因天災不耕種，好商人不因虧損不營業，君子不因貧窮放棄對道義的追求。", sentence1: "即使生活再艱難，他依然堅守原則，做到了「士君子不為貧窮怠乎道」。", sentence2: "創業遇到瓶頸也不能輕言放棄，就如良農不為水旱不耕一樣。", scene: "好農夫不因天災不耕種，好商人不因虧損不營業，君子不因貧窮放棄對道義的追求。" },
            { id: 185, term: "見人過失易，恕人過失難", definition: "諺語。看到別人的缺點很容易，但要原諒別人的過錯卻很困難。", sentence1: "我們常常對別人要求太高，正所謂見人過失易，恕人過失難。", sentence2: "懂得包容才是高情商的表現，雖然見人過失易，恕人過失難。", scene: "看到別人的缺點很容易，但要原諒別人的過錯卻很困難。" },
            { id: 186, term: "見人說人話，見鬼說鬼話", definition: "諺語。形容人善於看風使舵、迎合對方，說話圓滑甚至虛偽。", sentence1: "他在商場上打滾多年，早就練就了一身見人說人話，見鬼說鬼話的本事。", sentence2: "這種見人說人話，見鬼說鬼話的雙面人，很難讓人真心信任。", scene: "形容人善於看風使舵、迎合對方，說話圓滑甚至虛偽。" },
            { id: 187, term: "見微知著", definition: "成語。看到事情的微小跡象，就能知道其未來的發展趨勢。", sentence1: "一個優秀的企業家必須具備見微知著的能力，才能洞察市場先機。", sentence2: "透過這些微小的數據變化，專家見微知著，預測了未來的經濟走向。", scene: "看到事情的微小跡象，就能知道其未來的發展趨勢。" },
            { id: 188, term: "見賢思齊", definition: "成語。看到有德行才學的人，就會想努力和他一樣。", sentence1: "讀了偉人傳記後，我們應該要有見賢思齊的心，努力提升自己。", sentence2: "學校表揚模範生，就是希望同學們能見賢思齊，互相學習。", scene: "看到有德行才學的人，就會想努力和他一樣。" },
            { id: 189, term: "言不由衷", definition: "成語。說的話不是出於內心。指敷衍或虛偽的應酬話。", sentence1: "他雖然嘴上說恭喜，但表情卻很冷淡，顯然是言不由衷。", sentence2: "為了不破壞氣氛，他只好言不由衷地誇獎了對方的廚藝。", scene: "說的話不是出於內心。指敷衍或虛偽的應酬話。" },
            { id: 190, term: "言多必失", definition: "成語。話說多了必定會有失誤。", sentence1: "開會時最好謹慎發言，要知道言多必失的道理。", sentence2: "他因為酒後言多必失，不小心洩漏了公司的機密。", scene: "話說多了必定會有失誤。" },
            { id: 191, term: "言行合一", definition: "成語。說的話和做的事相符合。指人誠實守信。", sentence1: "真正的領導者必須言行合一，才能讓部屬心服口服。", sentence2: "他是個言行合一的君子，答應的事就一定會做到。", scene: "說的話和做的事相符合。指人誠實守信。" },
            { id: 192, term: "言者諄諄，聽者藐藐", definition: "成語。說的人很懇切，聽的人卻漫不經心。", sentence1: "老師在台上講得言者諄諄，台下的學生卻聽得藐藐，甚至打起瞌睡。", sentence2: "父母苦口婆心地勸告，沒想到他卻言者諄諄，聽者藐藐，依然故我。", scene: "說的人很懇切，聽的人卻漫不經心。" },
            { id: 193, term: "言惡不及人，言善不及身", definition: "語錄。說不好的事情不要牽扯到別人，說好的事情不要只往自己身上攬。", sentence1: "為人處世應謹記言惡不及人，言善不及身的原則，才能廣結善緣。", sentence2: "他把功勞都歸給團隊，展現了言善不及身的大將之風。", scene: "說不好的事情不要牽扯到別人，說好的事情不要只往自己身上攬。" },
            { id: 194, term: "言語簡寡，在我可以少悔，在人可以少怨", definition: "語錄/警句。說話簡潔少言，對自己能減少懊悔，對別人能減少怨恨。", sentence1: "為了避免禍從口出，他始終信奉「言語簡寡，在我可以少悔」的哲理。", sentence2: "學會閉嘴是種智慧，畢竟言語簡寡，在人可以少怨。", scene: "說話簡潔少言，對自己能減少懊悔，對別人能減少怨恨。" },
            { id: 195, term: "身修而後家齊，家齊而後國治", definition: "語錄 (出自《大學》)。自身修養好才能管理好家庭，家庭管理好才能治理好國家。", sentence1: "從政者必須明白修身齊家治國平天下的道理，做到身修而後家齊。", sentence2: "他把家裡打理得井井有條，印證了家齊而後國治的基礎。", scene: "自身修養好才能管理好家庭，家庭管理好才能治理好國家。" },
            { id: 196, term: "阮囊羞澀", definition: "成語。晉代阮孚的錢袋空空。比喻手頭不寬裕，缺乏錢財。", sentence1: "月底還沒發薪水，他現在阮囊羞澀，只能吃泡麵度日。", sentence2: "雖然阮囊羞澀，但他依然保持著樂觀開朗的心情。", scene: "晉代阮孚的錢袋空空。比喻手頭不寬裕，缺乏錢財。" },
            { id: 197, term: "防衛自己、刺傷別人", definition: "短語/比喻。指為了保護自己，卻使用了不當的言語或行為去傷害他人。", sentence1: "溝通時不要像刺蝟一樣防衛自己、刺傷別人，這樣只會把關係弄僵。", sentence2: "他的尖酸刻薄其實是出自於自卑，用防衛自己、刺傷別人的方式來武裝自己。", scene: "指為了保護自己，卻使用了不當的言語或行為去傷害他人。" },
            { id: 198, term: "事半功倍", definition: "成語。花費一半的力氣，卻能得到雙倍的效果。形容做事得法，效率很高。", sentence1: "掌握了正確的讀書方法，學習起來就能事半功倍。", sentence2: "使用這套新軟體來處理數據，絕對能達到事半功倍的效果。", scene: "花費一半的力氣，卻能得到雙倍的效果。形容做事得法，效率很高。" },
            { id: 199, term: "事到臨頭", definition: "成語。事情已經來到眼前。指已經到了關鍵或危急的時刻。", sentence1: "你平時不燒香，事到臨頭才來抱佛腳，怎麼來得及？", sentence2: "事到臨頭，他反而冷靜下來，迅速想出了應對的方法。", scene: "事情已經來到眼前。指已經到了關鍵或危急的時刻。" },
            { id: 200, term: "事實勝於雄辯", definition: "成語。真實發生的事情比高超的辯論更具有說服力。", sentence1: "無論你怎麼狡辯，事實勝於雄辯，錄影帶已經拍下了你的犯行。", sentence2: "我們不用多說什麼，用成績來證明事實勝於雄辯吧。", scene: "真實發生的事情比高超的辯論更具有說服力。" },
            { id: 201, term: "侃侃而談的人播種，緘默不語的人收穫", definition: "語錄。比喻說話者在散播思想，而善於傾聽的人則能吸收智慧而有所得。", sentence1: "溝通時要懂得傾聽，要知道侃侃而談的人播種，緘默不語的人收穫。", sentence2: "智者往往在會議中少說多聽，因為他們明白緘默不語的人才能收穫更多資訊。", scene: "比喻說話者在散播思想，而善於傾聽的人則能吸收智慧而有所得。" },
            { id: 202, term: "兩腳書櫥", definition: "成語。比喻死讀書，不知靈活運用知識的人。", sentence1: "讀書要懂得融會貫通，否則讀再多也只不過是個兩腳書櫥。", sentence2: "他雖然學歷很高，但遇到實際問題卻不知所措，簡直是個兩腳書櫥。", scene: "比喻死讀書，不知靈活運用知識的人。" },
            { id: 203, term: "典雅精鍊", definition: "詞語。形容文章或言辭優美而不落俗套，簡潔而沒有廢話。", sentence1: "他的演講稿寫得典雅精鍊，讓台下聽眾深受感動。", sentence2: "這首詩用詞典雅精鍊，是文學史上難得的佳作。", scene: "形容文章或言辭優美而不落俗套，簡潔而沒有廢話。" },
            { id: 204, term: "初戀的感情是一盆水，平時放穩了休想弄灑半點，可是一旦潑它出去，不但收不回來，而且一滴也不留", definition: "語錄。比喻初戀的感情極為珍貴且覆水難收，一旦付出便是毫無保留。", sentence1: "他始終忘不了前女友，真應了「初戀的感情是一盆水，一旦潑出去就收不回來」這句話。", sentence2: "面對逝去的青春，她感嘆初戀的感情就像潑出去的水，一滴也不留。", scene: "比喻初戀的感情極為珍貴且覆水難收，一旦付出便是毫無保留。" },
            { id: 205, term: "卑躬屈膝", definition: "成語。形容對人低聲下氣，極盡討好、奉承的樣子。", sentence1: "為了保住這份工作，他不得不在上司面前卑躬屈膝。", sentence2: "即使生活再艱難，他也不願向那些惡勢力卑躬屈膝。", scene: "形容對人低聲下氣，極盡討好、奉承的樣子。" },
            { id: 206, term: "周郎顧曲", definition: "典故。三國周瑜精通音樂，聽出錯誤便會轉頭去看彈奏者。比喻聽琴或聽音樂的內行、知音。", sentence1: "他對古典音樂非常有研究，堪稱現代的周郎顧曲。", sentence2: "這位樂評人具備周郎顧曲的功力，總能敏銳地指出演奏者的瑕疵。", scene: "比喻聽琴或聽音樂的內行、知音。" },
            { id: 207, term: "始齔之年", definition: "詞語/借代。齔指換牙。指兒童七、八歲開始換牙的年紀。", sentence1: "他在始齔之年就展現了過人的數學天賦。", sentence2: "妹妹剛滿始齔之年，正是活潑好動、充滿好奇心的年紀。", scene: "齔指換牙。指兒童七、八歲開始換牙的年紀。" },
            { id: 208, term: "委靡不振", definition: "成語。形容精神不振作，意志消沉。", sentence1: "經歷了這次嚴重的打擊，他整個人變得委靡不振。", sentence2: "看他這幾天委靡不振的樣子，肯定是遇到了什麼煩心事。", scene: "形容精神不振作，意志消沉。" },
            { id: 209, term: "幸福的祕訣在看到別人的優點，看到自己的缺點", definition: "語錄。指出獲得幸福的方法在於懂得欣賞他人、反省自己，保持謙卑與包容。", sentence1: "夫妻相處之道無他，幸福的祕訣在看到別人的優點，看到自己的缺點。", sentence2: "團隊合作能融洽，是因為大家都懂得幸福的祕訣在看到別人的優點，看到自己的缺點。", scene: "指出獲得幸福的方法在於懂得欣賞他人、反省自己，保持謙卑與包容。" },
            { id: 210, term: "忿忿不平", definition: "成語。心中感到極度憤怒而不平。", sentence1: "對於裁判不公的判決，球迷們都感到忿忿不平。", sentence2: "看到他無辜被指責，旁人都替他忿忿不平。", scene: "心中感到極度憤怒而不平。" },
            { id: 211, term: "放下屠刀，立地成佛", definition: "諺語/典故。比喻作惡的人只要決心改過自新，立刻就能成為好人。", sentence1: "只要你願意真心悔改，放下屠刀，立地成佛，社會還是會接納你的。", sentence2: "他過去雖然混過黑道，但如今已放下屠刀，立地成佛，熱心參與公益。", scene: "比喻作惡的人只要決心改過自新，立刻就能成為好人。" },
            { id: 212, term: "放冷箭", definition: "詞語。比喻暗中傷人。", sentence1: "職場上難免會遇到喜歡在背後放冷箭的小人，必須要提高警覺。", sentence2: "他表面上和你稱兄道弟，背地裡卻經常放冷箭，這種朋友交不得。", scene: "比喻暗中傷人。" },
            { id: 213, term: "放炮", definition: "詞語。比喻發表猛烈或不當的抨擊言論；也指麻將中打出別人要胡的牌。", sentence1: "他在會議上突然放炮，批評公司的決策，讓場面十分尷尬。", sentence2: "講話前要三思，別總是像個大聲公一樣亂放炮。", scene: "比喻發表猛烈或不當的抨擊言論；也指麻將中打出別人要胡的牌。" },
            { id: 214, term: "明眸皓齒", definition: "成語。明亮的眼睛，潔白的牙齒。形容女子容貌美麗。", sentence1: "那位明眸皓齒的女孩，一走進會場就吸引了眾人的目光。", sentence2: "照片中的母親在年輕時是個明眸皓齒的標準美人。", scene: "明亮的眼睛，潔白的牙齒。形容女子容貌美麗。" },
            { id: 215, term: "欣喜若狂", definition: "成語。高興得像發狂一樣。形容極度高興。", sentence1: "得知自己考上第一志願後，他高興得欣喜若狂。", sentence2: "聽到中華隊奪得世界冠軍的消息，全國球迷都欣喜若狂。", scene: "高興得像發狂一樣。形容極度高興。" },
            { id: 216, term: "沮喪萬分", definition: "詞語。形容心情極度低落、灰心失望。", sentence1: "由於精心準備的企劃案被退回，他感到沮喪萬分。", sentence2: "看到愛犬病重的樣子，主人沮喪萬分地掉下眼淚。", scene: "形容心情極度低落、灰心失望。" },
            { id: 217, term: "爭功諉過", definition: "成語。爭奪功勞，推卸過失。", sentence1: "這種只會爭功諉過的主管，很難讓部屬信服。", sentence2: "團隊合作最忌諱的就是成員之間互相爭功諉過。", scene: "爭奪功勞，推卸過失。" },
            { id: 218, term: "物以類聚", definition: "成語。同類的東西常聚在一起。多比喻壞人互相勾結。", sentence1: "他們這群小混混成天混在一起，真是物以類聚。", sentence2: "俗話說物以類聚，看他交的朋友就知道他的為人了。", scene: "同類的東西常聚在一起。多比喻壞人互相勾結。" },
            { id: 219, term: "狐狸歸咎於陷阱，而人歸咎於自己", definition: "語錄。比喻動物只會怪罪外在環境，而有智慧的人懂得反求諸己、自我檢討。", sentence1: "失敗時不要找藉口，要記得狐狸歸咎於陷阱，而人歸咎於自己。", sentence2: "優秀的領導者深知「狐狸歸咎於陷阱，而人歸咎於自己」的道理，總先檢討自身的決策。", scene: "比喻動物只會怪罪外在環境，而有智慧的人懂得反求諸己、自我檢討。" },
            { id: 220, term: "狗嘴吐不出象牙", definition: "諺語。比喻壞人嘴裡說不出好話。", sentence1: "你別理他，他那個人就是狗嘴吐不出象牙，專門損人。", sentence2: "聽他一開口就知道是來找碴的，真是狗嘴吐不出象牙。", scene: "比喻壞人嘴裡說不出好話。" },
            { id: 221, term: "知人者智，自知者明", definition: "語錄 (出自《老子》)。了解別人是智慧，了解自己才是真正的聰明。", sentence1: "在職場上，我們要懂得「知人者智，自知者明」，才能發揮所長並與人合作。", sentence2: "他能準確評估自己的優缺點，真是個「自知者明」的人。", scene: "了解別人是智慧，了解自己才是真正的聰明。" },
            { id: 222, term: "知足常樂", definition: "成語。知道滿足，就能常保快樂。", sentence1: "爺爺的生活雖然簡樸，但他知足常樂，每天都過得很開心。", sentence2: "人不要過度貪婪，知足常樂才是幸福的根本。", scene: "知道滿足，就能常保快樂。" },
            { id: 223, term: "知無不言，言無不盡", definition: "成語。知道的沒有不說的，說的沒有不毫無保留的。形容對人毫無保留、真誠進言。", sentence1: "只要是為了公司好，我一定知無不言，言無不盡。", sentence2: "他對徒弟的指導總是知無不言，言無不盡，非常用心。", scene: "知道的沒有不說的，說的沒有不毫無保留的。形容對人毫無保留、真誠進言。" },
            { id: 224, term: "知道如何擁有，這就是成功的祕訣", definition: "語錄。強調不僅要懂得爭取，更要懂得珍惜和管理已擁有的事物。", sentence1: "守成不易，知道如何擁有，這就是成功的祕訣，別讓努力付諸流水。", sentence2: "許多人得獎後很快就沒落，因為他們不懂得「知道如何擁有，這就是成功的祕訣」。", scene: "強調不僅要懂得爭取，更要懂得珍惜和管理已擁有的事物。" },
            { id: 225, term: "空穴來風", definition: "成語。原指有空隙的地方才會透風。現多比喻流言乘隙而入，或事出無因、憑空捏造。", sentence1: "這種沒有根據的空穴來風，大家聽聽就算了，千萬別當真。", sentence2: "有關他要離職的傳聞，其實只是空穴來風罷了。", scene: "現多比喻流言乘隙而入，或事出無因、憑空捏造。" },
            { id: 226, term: "花有重開日，人無再少年", definition: "諺語/詩句。花謝了還有再開的時候，人老了卻無法重返青春。勸人珍惜光陰。", sentence1: "光陰似箭，花有重開日，人無再少年，年輕人要好好把握時間學習。", sentence2: "看到過去的照片，他不禁感嘆花有重開日，人無再少年啊。", scene: "花謝了還有再開的時候，人老了卻無法重返青春。勸人珍惜光陰。" },
            { id: 227, term: "花言巧語", definition: "成語。虛假而動聽的話。", sentence1: "詐騙集團通常都會用花言巧語來騙取被害人的信任。", sentence2: "你別被他的花言巧語給騙了，他其實是個不負責任的人。", scene: "虛假而動聽的話。" },
            { id: 228, term: "花信之年", definition: "詞語/借代。指女子二十四歲的年紀。", sentence1: "她正值花信之年，卻已經是一家公司的執行長了。", sentence2: "剛滿花信之年的她，準備出國深造，追求自己的夢想。", scene: "指女子二十四歲的年紀。" },
            { id: 229, term: "虎死留皮，人死留名", definition: "諺語。老虎死後留下珍貴的毛皮，人死後應留下美好的名聲。勸人應注重名譽。", sentence1: "大丈夫做事要光明磊落，要知道虎死留皮，人死留名的道理。", sentence2: "為了不讓家族蒙羞，他決定辭去高薪職位，只為追求虎死留皮，人死留名的清譽。", scene: "老虎死後留下珍貴的毛皮，人死後應留下美好的名聲。勸人應注重名譽。" },
            { id: 230, term: "虯髯客傳", definition: "典故/文學。唐代傳奇小說主角虯髯客具有豪俠氣概，後將家產贈予李靖幫助李世民。比喻胸懷大志、慷慨豪邁的俠客。", sentence1: "讀完《虯髯客傳》，我不禁對那位慷慨贈產、豪氣干雲的紅拂女知己感到欽佩。", sentence2: "這部武俠小說中的主角，頗有幾分《虯髯客傳》裡豪邁的影子。", scene: "比喻胸懷大志、慷慨豪邁的俠客。" },
            { id: 231, term: "金龜婿", definition: "詞語。比喻身分高貴、有錢有勢的女婿。", sentence1: "自從她嫁了個金龜婿後，生活變得非常奢華。", sentence2: "許多父母都希望能把女兒嫁給金龜婿，讓她下半輩子衣食無缺。", scene: "比喻身分高貴、有錢有勢的女婿。" },
            { id: 232, term: "阿諛奉承", definition: "成語。迎合別人的心意，說好聽的話討好對方。", sentence1: "他為了升官，整天在老闆面前阿諛奉承，看了真讓人討厭。", sentence2: "真正的朋友會直言你的過錯，而不是一味地阿諛奉承。", scene: "迎合別人的心意，說好聽的話討好對方。" },
            { id: 233, term: "青史名留", definition: "成語。在歷史上留下美好的名聲。", sentence1: "那些為國家犧牲奉獻的烈士，必將青史名留。", sentence2: "他研發出能治癒絕症的藥物，注定要青史名留。", scene: "在歷史上留下美好的名聲。" },
            { id: 234, term: "亭亭玉立", definition: "成語。形容女子身材修長美麗；或形容花木挺拔。", sentence1: "幾年不見，當年的小女孩已經長成亭亭玉立的少女了。", sentence2: "池塘裡的荷花亭亭玉立，隨風搖曳，美不勝收。", scene: "形容女子身材修長美麗；或形容花木挺拔。" },
            { id: 235, term: "信手拈來", definition: "成語。隨手拿來。多形容寫文章時詞彙或材料豐富，不費思索就能運用。", sentence1: "這位作家才思敏捷，寫文章時各種典故信手拈來。", sentence2: "他對這項技術非常熟悉，操作起來猶如信手拈來般輕鬆。", scene: "隨手拿來。多形容寫文章時詞彙或材料豐富，不費思索就能運用。" },
            { id: 236, term: "削足適履", definition: "成語。削去腳趾來適應鞋子的大小。比喻勉強遷就，拘泥舊例而不知變通。", sentence1: "把國外的制度生搬硬套到國內，無異於是削足適履，肯定會出問題。", sentence2: "制定計畫必須考量實際情況，絕不能削足適履。", scene: "削去腳趾來適應鞋子的大小。比喻勉強遷就，拘泥舊例而不知變通。" },
            { id: 237, term: "屋漏偏逢連夜雨", definition: "諺語。比喻倒楣的事接連發生，禍不單行。", sentence1: "剛失業又生了重病，他真是屋漏偏逢連夜雨。", sentence2: "公司業績下滑，現在又遇到供應商斷貨，簡直是屋漏偏逢連夜雨。", scene: "比喻倒楣的事接連發生，禍不單行。" },
            { id: 238, term: "後知後覺", definition: "成語。事情發生後才察覺到。形容反應遲鈍。", sentence1: "大家都已經知道消息了，你怎麼還這麼後知後覺？", sentence2: "在這瞬息萬變的市場中，後知後覺的企業很容易被淘汰。", scene: "事情發生後才察覺到。形容反應遲鈍。" },
            { id: 239, term: "急驚風遇著慢郎中", definition: "諺語。比喻急性子遇到慢吞吞的人，十分著急卻無可奈何。", sentence1: "老闆急著要資料，偏偏助理做事慢條斯理，真是急驚風遇著慢郎中。", sentence2: "每次出門他都催個不停，老婆卻還在慢慢化妝，標準的急驚風遇著慢郎中。", scene: "比喻急性子遇到慢吞吞的人，十分著急卻無可奈何。" },
            { id: 240, term: "怨天尤人", definition: "成語。遭遇挫折時，只會抱怨上天，怪罪別人。", sentence1: "遇到困難要設法解決，一味地怨天尤人是無濟於事的。", sentence2: "他考試考不好不怪自己不用功，反而怨天尤人，說題目太難。", scene: "遭遇挫折時，只會抱怨上天，怪罪別人。" },
            { id: 241, term: "指桑罵槐", definition: "成語。指著桑樹罵槐樹。比喻表面上罵這個人，實際上卻在暗罵另一個人。", sentence1: "主管在會議上雖然沒有點名，但大家聽得出來他是在指桑罵槐。", sentence2: "她心裡有氣不敢直說，只好對著小狗指桑罵槐。", scene: "指著桑樹罵槐樹。比喻表面上罵這個人，實際上卻在暗罵另一個人。" },
            { id: 242, term: "按部就班", definition: "成語。按照一定的條理和步驟做事。", sentence1: "只要按部就班地執行計畫，這個專案一定能如期完成。", sentence2: "學習必須按部就班，不能想要一步登天。", scene: "按照一定的條理和步驟做事。" },
            { id: 243, term: "故人西辭黃鶴樓，煙花三月下揚州", definition: "詩詞名句 (出自李白《黃鶴樓送孟浩然之廣陵》)。描寫在春意盎然的時節送別老朋友，意境優美深遠。", sentence1: "每逢春暖花開之際，總讓人想起「故人西辭黃鶴樓，煙花三月下揚州」的詩句。", sentence2: "在這春末夏初送別好友，特別能體會故人西辭黃鶴樓，煙花三月下揚州的離情。", scene: "描寫在春意盎然的時節送別老朋友，意境優美深遠。" },
            { id: 244, term: "洋洋灑灑", definition: "成語。形容文章或談話內容豐富，連續不斷。", sentence1: "他寫了一篇洋洋灑灑上萬字的報告，詳細分析了市場趨勢。", sentence2: "針對這個議題，他在台上洋洋灑灑地講了兩個小時。", scene: "形容文章或談話內容豐富，連續不斷。" },
            { id: 245, term: "為者常成，行者常至", definition: "語錄 (出自《晏子春秋》)。努力去做的人常常能成功，不懈行走的人常常能到達目的地。強調實踐的重要性。", sentence1: "不要光說不練，為者常成，行者常至，動手去做才有成功的機會。", sentence2: "他能考上理想大學，靠的就是為者常成，行者常至的毅力。", scene: "努力去做的人常常能成功，不懈行走的人常常能到達目的地。強調實踐的重要性。" },
            { id: 246, term: "紅拂女", definition: "典故/文學。唐代傳奇中的奇女子，慧眼識英雄，私奔李靖。比喻有眼光、勇於追求愛情的奇女子。", sentence1: "她為了愛情放棄一切，勇敢追愛的精神宛如現代紅拂女。", sentence2: "故事中那位具備獨到眼光、果斷決策的女主角，儼然就是紅拂女的化身。", scene: "比喻有眼光、勇於追求愛情的奇女子。" },
            { id: 247, term: "背黑鍋", definition: "詞語。比喻代人受過，承擔莫須有的罪名。", sentence1: "這個錯誤明明是經理造成的，卻要基層員工來背黑鍋。", sentence2: "我才不願意替他背黑鍋，這件事必須調查清楚。", scene: "比喻代人受過，承擔莫須有的罪名。" },
            { id: 248, term: "胡吹亂謅", definition: "成語。毫無根據地瞎吹牛、亂說話。", sentence1: "這個業務員為了業績，常常對客戶胡吹亂謅產品的功能。", sentence2: "他的演講內容根本是胡吹亂謅，沒有一點科學根據。", scene: "毫無根據地瞎吹牛、亂說話。" },
            { id: 249, term: "苛政猛於虎", definition: "語錄/典故 (出自《禮記》)。繁重嚴酷的政令比老虎還要可怕。指施政嚴苛會讓百姓無法生存。", sentence1: "古代農民起義，多半是因為官府逼稅太緊，印證了苛政猛於虎的道理。", sentence2: "面對極權統治下的暴政，人民深刻體會到苛政猛於虎的悲哀。", scene: "繁重嚴酷的政令比老虎還要可怕。指施政嚴苛會讓百姓無法生存。" },
            { id: 250, term: "苦中作樂", definition: "成語。在困苦的環境中尋求快樂。", sentence1: "雖然連日大雨導致停電，但大家聚在一起點蠟燭唱歌，也算是苦中作樂。", sentence2: "戰火中，士兵們在前線分享著家書，這是他們唯一的苦中作樂。", scene: "在困苦的環境中尋求快樂。" },
            { id: 251, term: "范雎", definition: "典故/歷史人物。戰國時魏國人，後相秦提出「遠交近攻」，有「范雎報仇（睚眥必報）」的典故。", sentence1: "他這次的反擊手段極為凌厲，頗有當年范雎報仇的狠勁。", sentence2: "企業併購時採取了類似范雎「遠交近攻」的策略，成功擴張版圖。", scene: "戰國時魏國人，後相秦提出「遠交近攻」，有「范雎報仇（睚眥必報）」的典故。" },
            { id: 252, term: "飛來橫禍", definition: "成語。突然發生的意外災禍。", sentence1: "他走在路上突然被掉落的招牌砸中，真是飛來橫禍。", sentence2: "這場突如其來的地震，對這個小鎮來說無疑是一場飛來橫禍。", scene: "突然發生的意外災禍。" },
            { id: 253, term: "首尾相應", definition: "成語。頭尾互相照應。多指文章結構嚴謹，或軍隊陣型互相支援。", sentence1: "這篇文章的開頭和結尾首尾相應，點出了全文的主旨。", sentence2: "將軍佈置的陣型首尾相應，讓敵軍無法輕易突破。", scene: "頭尾互相照應。多指文章結構嚴謹，或軍隊陣型互相支援。" },
            { id: 254, term: "借題發揮", definition: "成語。假借某件事情為題目，來表達自己真正的意見或發洩情緒。", sentence1: "經理只是借題發揮，其實他早就不滿這個部門的表現了。", sentence2: "這篇社論借題發揮，表面上談論民生，實際上是在批評政府政策。", scene: "假借某件事情為題目，來表達自己真正的意見或發洩情緒。" },
            { id: 255, term: "凍蒜", definition: "詞語 (源自閩南語「當選」諧音)。選舉時支持者呼喊的口號，希望候選人順利當選。", sentence1: "造勢晚會上，台下群眾齊聲高喊「凍蒜」，氣氛非常熱烈。", sentence2: "他的支持者準備了許多印有「凍蒜」字樣的旗幟來為他加油。", scene: "選舉時支持者呼喊的口號，希望候選人順利當選。" },
            { id: 256, term: "剛毅木訥", definition: "成語。性格剛強堅毅，不善於言辭。孔子認為這種品格接近於「仁」。", sentence1: "他雖然剛毅木訥，不善言辭，但做事卻非常實在可靠。", sentence2: "父親是個剛毅木訥的漢子，總是默默地為家庭付出。", scene: "性格剛強堅毅，不善於言辭。孔子認為這種品格接近於「仁」。" },
            { id: 257, term: "原來這世上能跟你共同領略一個笑話的人竟如此難得", definition: "語錄。感嘆能遇到頻率相合、心靈契合的知音非常不容易。", sentence1: "講了一個沒人笑的梗後，我才明白原來這世上能跟你共同領略一個笑話的人竟如此難得。", sentence2: "找到靈魂伴侶的感覺，大概就是發現原來這世上能跟你共同領略一個笑話的人竟如此難得。", scene: "感嘆能遇到頻率相合、心靈契合的知音非常不容易。" },
            { id: 258, term: "孫敬", definition: "典故/歷史人物。東漢人，讀書時為防止打瞌睡將頭髮繫在屋梁上（懸梁）。比喻勤奮刻苦讀書。", sentence1: "為了準備大考，他效法古人孫敬懸梁的精神，熬夜苦讀。", sentence2: "雖然不用像孫敬那樣懸梁，但我們讀書的確需要他那種堅韌的毅力。", scene: "比喻勤奮刻苦讀書。" },
            { id: 259, term: "宰相肚裡能撐船", definition: "諺語。比喻人的心胸寬大，能包容別人的過錯。", sentence1: "你就別跟他計較了，大人有大量，宰相肚裡能撐船嘛！", sentence2: "老闆聽完部屬的批評後不但沒生氣，還虛心接受，真是宰相肚裡能撐船。", scene: "比喻人的心胸寬大，能包容別人的過錯。" },
            { id: 260, term: "射人先射馬，擒賊先擒王", definition: "諺語/詩句 (出自杜甫)。作戰時要先射倒敵人的戰馬，抓賊要先抓首領。比喻做事要抓住關鍵。", sentence1: "處理這件抗議事件，必須找出帶頭的人來溝通，正所謂射人先射馬，擒賊先擒王。", sentence2: "警方決定採取擒賊先擒王的策略，直接逮捕販毒集團的首腦。", scene: "作戰時要先射倒敵人的戰馬，抓賊要先抓首領。比喻做事要抓住關鍵。" },
            { id: 261, term: "時然後言，人不厭其言", definition: "語錄 (出自《論語》)。在適當的時機才說話，別人就不會討厭他的話。強調說話要注意時機。", sentence1: "聰明人懂得看場合說話，這就是所謂的時然後言，人不厭其言。", sentence2: "主管總是在團隊最需要鼓勵的時候才發言，做到了時然後言，人不厭其言。", scene: "在適當的時機才說話，別人就不會討厭他的話。強調說話要注意時機。" },
            { id: 262, term: "栽贓", definition: "詞語。把偷盜的贓物或違禁品暗中放在別人那裡，藉以誣陷對方。", sentence1: "毒販為了脫罪，竟然將毒品藏在朋友的車上企圖栽贓。", sentence2: "警方經過調查，證實他是被對手栽贓陷害的，終於還他清白。", scene: "把偷盜的贓物或違禁品暗中放在別人那裡，藉以誣陷對方。" },
            { id: 263, term: "桂林山水甲天下，陽朔山水甲桂林", definition: "諺語/名句。讚美廣西桂林與陽朔的自然風景天下第一，極為秀麗。", sentence1: "來到廣西旅遊，才真正體會到為何人們常說桂林山水甲天下，陽朔山水甲桂林。", sentence2: "這幅國畫完美呈現了桂林山水甲天下，陽朔山水甲桂林的奇峰秀水。", scene: "讚美廣西桂林與陽朔的自然風景天下第一，極為秀麗。" },
            { id: 264, term: "梳理思緒", definition: "詞語。整理、釐清自己混亂的想法和心思。", sentence1: "在做重大決定前，他需要一個人靜一靜，好好梳理思緒。", sentence2: "透過寫作，她將最近發生的事情記錄下來，藉此梳理思緒。", scene: "整理、釐清自己混亂的想法和心思。" },
            { id: 265, term: "涉獵雖曰無用，猶勝於不通古今；清高固然可嘉，莫流於不識時務", definition: "語錄。廣泛閱讀看似無用卻勝過無知；清高值得讚賞但不能變成不懂現實的迂腐。", sentence1: "讀些課外書雖然對考試無益，但涉獵雖曰無用，猶勝於不通古今。", sentence2: "他堅持理想卻處處碰壁，朋友勸他：「清高固然可嘉，莫流於不識時務啊！」", scene: "廣泛閱讀看似無用卻勝過無知；清高值得讚賞但不能變成不懂現實的迂腐。" },
            { id: 266, term: "留得青山在，不怕沒柴燒", definition: "諺語。比喻只要還有生命或基本條件，將來就有復興的希望。", sentence1: "雖然這次投資全軍覆沒，但只要人還健康，留得青山在，不怕沒柴燒。", sentence2: "面對破產的危機，他安慰自己留得青山在，不怕沒柴燒，總有東山再起的一天。", scene: "比喻只要還有生命或基本條件，將來就有復興的希望。" },
            { id: 267, term: "破銅爛鐵", definition: "詞語。破舊殘缺、失去原有使用價值的金屬物品。比喻無用的廢物。", sentence1: "資源回收場裡堆滿了各種破銅爛鐵。", sentence2: "這些舊機器已經無法運作，跟破銅爛鐵沒兩樣了。", scene: "破舊殘缺、失去原有使用價值的金屬物品。比喻無用的廢物。" },
            { id: 268, term: "破繭而出", definition: "成語。蟲蛹咬破繭殼羽化成蟲。比喻人突破困境，獲得新生或成長。", sentence1: "經歷了多年的磨練，這位運動員終於破繭而出，奪得金牌。", sentence2: "只要勇敢面對挑戰，我們都能破繭而出，蛻變成更好的自己。", scene: "蟲蛹咬破繭殼羽化成蟲。比喻人突破困境，獲得新生或成長。" },
            { id: 269, term: "破爛不堪", definition: "成語。形容東西非常破舊，或事物殘破到了極點。", sentence1: "這棟廢棄的空屋早已破爛不堪，搖搖欲墜。", sentence2: "他穿著一件破爛不堪的衣服，在街頭流浪。", scene: "形容東西非常破舊，或事物殘破到了極點。" },
            { id: 270, term: "笑容燦爛", definition: "詞語。形容笑得非常開朗、明亮，充滿喜悅。", sentence1: "聽到這個好消息，她的臉上綻放出笑容燦爛。", sentence2: "畢業照上，每個同學都留下了笑容燦爛的青春印記。", scene: "形容笑得非常開朗、明亮，充滿喜悅。" },
            { id: 271, term: "紙老虎", definition: "詞語。比喻外表看似強大可怕，實際上卻很虛弱、不堪一擊的人或事物。", sentence1: "敵軍雖然聲勢浩大，但其實只是個紙老虎，不堪一擊。", sentence2: "他那凶狠的樣子只是偽裝，實際上是個膽小怕事的紙老虎。", scene: "比喻外表看似強大可怕，實際上卻很虛弱、不堪一擊的人或事物。" },
            { id: 272, term: "財大氣粗", definition: "成語。形容人因為有錢而氣派大、態度傲慢。", sentence1: "這個暴發戶仗著自己有錢就財大氣粗地指揮別人，讓人反感。", sentence2: "在競標會上，那家大企業財大氣粗地用高價壓倒了所有對手。", scene: "形容人因為有錢而氣派大、態度傲慢。" },
            { id: 273, term: "辱人者，人恆辱之", definition: "語錄。侮辱別人的人，別人也一定會侮辱他。", sentence1: "網路霸凌者最終會遭到反噬，正所謂辱人者，人恆辱之。", sentence2: "請尊重每一位服務人員，要知道辱人者，人恆辱之的道理。", scene: "侮辱別人的人，別人也一定會侮辱他。" },
            { id: 274, term: "退避三舍", definition: "成語。向後退讓九十里。比喻遇到衝突時主動退讓，不與對方相爭。", sentence1: "為了不破壞兩家的和氣，他決定在這次利益爭奪中退避三舍。", sentence2: "他的辯論功力太強了，讓對手不得不退避三舍。", scene: "向後退讓九十里。比喻遇到衝突時主動退讓，不與對方相爭。" },
            { id: 275, term: "退避三舍的重耳", definition: "典故。晉公子重耳流亡楚國時承諾日後交戰將退讓以報恩。比喻知恩圖報與信守承諾，或主動退讓。", sentence1: "他效法退避三舍的重耳，在商場上對當初的恩人讓出了大筆訂單。", sentence2: "為了避免衝突升級，他展現了退避三舍的重耳的風度，主動退讓。", scene: "比喻知恩圖報與信守承諾，或主動退讓。" },
            { id: 276, term: "逆來順受", definition: "成語。對不合理的待遇或惡劣的環境，不反抗，默默忍受。", sentence1: "在傳統社會裡，許多婦女對於婆婆的刁難只能逆來順受。", sentence2: "面對長官的不理智指責，為了飯碗他也只能逆來順受。", scene: "對不合理的待遇或惡劣的環境，不反抗，默默忍受。" },
            { id: 277, term: "馬耳東風", definition: "成語。比喻把別人的話當作耳邊風，充耳不聞，毫不在意。", sentence1: "老師苦口婆心地勸告，對他來說卻如馬耳東風，完全沒聽進去。", sentence2: "他把醫生的囑咐當作馬耳東風，依然天天熬夜喝酒。", scene: "比喻把別人的話當作耳邊風，充耳不聞，毫不在意。" },
            { id: 278, term: "高處不勝寒", definition: "詩詞名句 (出自蘇軾《水調歌頭》)。高處太冷讓人難以承受。比喻身居高位的人，往往會感到孤單寂寞。", sentence1: "晉升為總經理後，他發現沒人敢跟他說真話，不禁感嘆高處不勝寒。", sentence2: "許多巨星在成名後都會面臨高處不勝寒的心理壓力。", scene: "高處太冷讓人難以承受。比喻身居高位的人，往往會感到孤單寂寞。" },
            { id: 279, term: "偏義複詞", definition: "語文知識。由兩個意義相近或相對的詞根組成，但在特定語境中，只保留其中一個詞根的意義。", sentence1: "文言文中的「忘記」往往只取「忘」的意思，這就是一種偏義複詞。", sentence2: "「國家」有時只指「國」，這也是偏義複詞的一種用法。", scene: "由兩個意義相近或相對的詞根組成，但在特定語境中，只保留其中一個詞根的意義。" },
            { id: 280, term: "偶然造成了我們的雙親，選擇造成了我們的朋友", definition: "語錄。指出親情是天生的緣分，而友情則是後天自主選擇的結果，強調擇友的重要性。", sentence1: "你無法決定家人，但可以決定交往對象，畢竟偶然造成了雙親，選擇造成了朋友。", sentence2: "這句話「偶然造成了我們的雙親，選擇造成了我們的朋友」道出了友誼的珍貴。", scene: "指出親情是天生的緣分，而友情則是後天自主選擇的結果，強調擇友的重要性。" },
            { id: 281, term: "唯口，出好，興戎", definition: "語錄 (出自《書經》)。口可以說出好話，也可以引發戰爭。警告人說話影響力極大，必須謹慎。", sentence1: "外交辭令必須字斟句酌，因為唯口，出好，興戎，一字之差可能引發危機。", sentence2: "網路發言請小心，要知道唯口，出好，興戎，別引發不必要的筆戰。", scene: "口可以說出好話，也可以引發戰爭。警告人說話影響力極大，必須謹慎。" },
            { id: 282, term: "國色天香", definition: "成語。原形容牡丹花色香俱佳。後多用來形容女子容貌極為美麗。", sentence1: "楊貴妃的美貌被世人譽為國色天香。", sentence2: "牡丹花不愧有國色天香的稱號，盛開時嬌豔無比。", scene: "原形容牡丹花色香俱佳。後多用來形容女子容貌極為美麗。" },
            { id: 283, term: "國家興亡，匹夫有責", definition: "語錄 (顧炎武)。國家的興盛或滅亡，即使是平民百姓也負有責任。", sentence1: "面對外敵入侵，青年們抱著「國家興亡，匹夫有責」的熱血投軍。", sentence2: "維護環境整潔不僅是政府的事，國家興亡，匹夫有責，每個人都該盡一份力。", scene: "國家的興盛或滅亡，即使是平民百姓也負有責任。" },
            { id: 284, term: "執牛耳", definition: "成語。古代諸侯結盟時由主盟者割牛耳取血。後比喻在某方面居於領導地位或權威地位。", sentence1: "這家科技公司在人工智慧領域早已是執牛耳的地位。", sentence2: "他在國內的學術界執牛耳，許多重大研究都由他主導。", scene: "古代諸侯結盟時由主盟者割牛耳取血。後比喻在某方面居於領導地位或權威地位。" },
            { id: 285, term: "將相本無種，男兒當自強", definition: "諺語。王侯將相不是天生的，有志氣的人應當發憤圖強，靠自己努力獲得成就。", sentence1: "他出身貧寒卻能白手起家，印證了將相本無種，男兒當自強的道理。", sentence2: "別因為家境不好就放棄夢想，將相本無種，男兒當自強啊！", scene: "王侯將相不是天生的，有志氣的人應當發憤圖強，靠自己努力獲得成就。" },
            { id: 286, term: "張口結舌", definition: "成語。張著嘴巴，舌頭卻動彈不得。形容因為理屈、緊張或驚訝而說不出話來。", sentence1: "面對記者尖銳的提問，那位官員頓時張口結舌，不知如何回答。", sentence2: "魔術師精彩的表演讓台下觀眾看得張口結舌。", scene: "張著嘴巴，舌頭卻動彈不得。形容因為理屈、緊張或驚訝而說不出話來。" },
            { id: 287, term: "張儀", definition: "典故/歷史人物。戰國時提倡「連橫」策略的縱橫家。比喻口才極佳、善於雄辯的人。", sentence1: "他的口才極好，辯論時猶如張儀再世，總能說服所有人。", sentence2: "想要當個好業務，就必須練就如同張儀般的三寸不爛之舌。", scene: "戰國時提倡「連橫」策略的縱橫家。比喻口才極佳、善於雄辯的人。" },
            { id: 288, term: "強強滾", definition: "詞語 (源自閩南語)。形容場面非常熱鬧、沸騰，或生意極好。", sentence1: "每逢假日，這條老街的人潮總是強強滾，擠得水洩不通。", sentence2: "跨年晚會的氣氛被知名歌手炒得強強滾。", scene: "形容場面非常熱鬧、沸騰，或生意極好。" },
            { id: 289, term: "得理不饒人", definition: "詞語。指在爭執中，雖然自己佔了理，卻不肯寬容、原諒對方，緊咬不放。", sentence1: "雖然是他不對在先，但你得理不饒人的態度也讓人很難接受。", sentence2: "溝通時要留點餘地，得理不饒人只會讓雙方的關係徹底破裂。", scene: "指在爭執中，雖然自己佔了理，卻不肯寬容、原諒對方，緊咬不放。" },
            { id: 290, term: "悵然若失", definition: "成語。形容心情失落，好像失去了什麼東西一樣。", sentence1: "看完這部感人的電影，他久久無法平復情緒，感到悵然若失。", sentence2: "辛苦準備的比賽被取消了，讓所有選手都感到悵然若失。", scene: "形容心情失落，好像失去了什麼東西一樣。" },
            { id: 291, term: "情定三生", definition: "成語。形容愛情的堅貞不渝，相信緣分深厚，生生世世都會在一起。", sentence1: "他們在月老廟前許下情定三生的誓言，希望能白頭偕老。", sentence2: "這對情侶經歷了無數波折終於步入禮堂，真是情定三生啊。", scene: "形容愛情的堅貞不渝，相信緣分深厚，生生世世都會在一起。" },
            { id: 292, term: "掛萬漏一", definition: "成語。形容掛念的多，遺漏的少；多用作謙詞，表示雖然盡力，但仍可能有疏漏。", sentence1: "這份清單雖然經過多次核對，但難免有掛萬漏一之處，請大家多包涵。", sentence2: "這次籌辦大型活動，我們極力求全，只怕還有掛萬漏一的地方。", scene: "形容掛念的多，遺漏的少；多用作謙詞，表示雖然盡力，但仍可能有疏漏。" },
            { id: 293, term: "接二連三", definition: "成語。一個接著一個，連續不斷。", sentence1: "這家工廠接二連三地發生工安意外，引起了勞工局的關注。", sentence2: "敵軍接二連三的猛烈攻勢，讓守軍感到難以招架。", scene: "一個接著一個，連續不斷。" },
            { id: 294, term: "欲加之罪，何患無辭", definition: "成語/典故。想要給人定罪，還怕找不到藉口嗎？指隨便捏造罪名來陷害人。", sentence1: "對手為了把他拉下台，故意扭曲他的話，真是欲加之罪，何患無辭。", sentence2: "歷史上許多忠臣都是在「欲加之罪，何患無辭」的政治鬥爭中犧牲的。", scene: "想要給人定罪，還怕找不到藉口嗎？指隨便捏造罪名來陷害人。" },
            { id: 295, term: "牽強附會", definition: "成語。把沒有關聯的事物硬扯在一起，作勉強的解釋。", sentence1: "他的這個推論根本是牽強附會，缺乏嚴謹的邏輯基礎。", sentence2: "把這兩件毫不相干的意外牽強附會地說成是陰謀，實在太荒謬了。", scene: "把沒有關聯的事物硬扯在一起，作勉強的解釋。" },
            { id: 296, term: "理直不必氣壯，義正不必辭嚴", definition: "語錄/警句。有道理時態度也不必盛氣凌人，維護正義時言語也不必太過嚴厲。勸人態度應溫和。", sentence1: "處理客訴時要謹記理直不必氣壯，義正不必辭嚴，才能圓滿解決問題。", sentence2: "他雖然佔理，但說話語氣平和，完美展現了「理直不必氣壯」的修養。", scene: "有道理時態度也不必盛氣凌人，維護正義時言語也不必太過嚴厲。勸人態度應溫和。" },
            { id: 297, term: "眼高手低", definition: "成語。眼界很高，但實際能力卻很低。形容要求標準高，但自己卻做不到。", sentence1: "年輕人剛出社會最忌諱眼高手低，應該要腳踏實地從基礎做起。", sentence2: "他總是批評別人的作品，自己卻寫不出一篇好文章，真是眼高手低。", scene: "眼界很高，但實際能力卻很低。形容要求標準高，但自己卻做不到。" },
            { id: 298, term: "眾口鑠金", definition: "成語。眾人的言論力量很大，連金屬都能熔化。比喻眾口一詞，積非成是。", sentence1: "在網路時代，我們更要防範眾口鑠金的網路霸凌現象。", sentence2: "謠言傳久了就會有人相信，這就是眾口鑠金的可怕之處。", scene: "眾人的言論力量很大，連金屬都能熔化。比喻眾口一詞，積非成是。" },
            { id: 299, term: "眾叛親離", definition: "成語。群眾背叛，親人離開。形容非常孤立，不得人心。", sentence1: "那位暴君最終落得眾叛親離的下場，被推翻了政權。", sentence2: "他因為沉迷賭博而傾家蕩產，最後弄得眾叛親離，無家可歸。", scene: "群眾背叛，親人離開。形容非常孤立，不得人心。" },
            { id: 300, term: "笨口拙舌", definition: "成語。形容人說話遲鈍，口才不好。", sentence1: "我這個人笨口拙舌的，不會說什麼甜言蜜語，只會用行動來證明。", sentence2: "他雖然笨口拙舌，但做起事來卻是一絲不苟，深受長官信賴。", scene: "形容人說話遲鈍，口才不好。" },
            { id: 301, term: "脣亡齒寒", definition: "成語。嘴唇沒了，牙齒就會感到寒冷。比喻雙方關係密切，利害相關，休戚與共。", sentence1: "這兩家公司有合作關係，一旦其中一家倒閉，另一家必然脣亡齒寒。", sentence2: "鄰國若被敵軍佔領，我國也會面臨脣亡齒寒的危機。", scene: "嘴唇沒了，牙齒就會感到寒冷。比喻雙方關係密切，利害相關，休戚與共。" },
            { id: 302, term: "莊周夢蝶", definition: "典故。莊子夢見自己變成蝴蝶。比喻人生如夢，變幻無常，或指物我兩忘的超然境界。", sentence1: "經歷了這場大病，他對人生有種莊周夢蝶般虛幻無常的感嘆。", sentence2: "讀完這本哲學小說，讓人不禁陷入莊周夢蝶的沉思中。", scene: "莊子夢見自己變成蝴蝶。比喻人生如夢，變幻無常，或指物我兩忘的超然境界。" },
            { id: 303, term: "處世戒多言", definition: "警句。勸誡人們在社會上為人處世，要避免話太多，以免惹出禍端。", sentence1: "剛到新環境，主管提醒他「處世戒多言」，多看多聽才是上策。", sentence2: "他因為大嘴巴而得罪了客戶，這才體會到處世戒多言的道理。", scene: "勸誡人們在社會上為人處世，要避免話太多，以免惹出禍端。" },
            { id: 304, term: "訥於言", definition: "詞語 (出自《論語》)。說話遲鈍。常接「敏於行」，指說話謹慎，但做事敏捷。", sentence1: "他雖然訥於言，但做事卻非常實在，從不推卸責任。", sentence2: "真正的君子往往訥於言而敏於行，不隨便誇下海口。", scene: "說話遲鈍。常接「敏於行」，指說話謹慎，但做事敏捷。" },
            { id: 305, term: "許多人倒在劍刃下，更多人則倒在舌頭下", definition: "語錄。指言語的殺傷力極強，言語造成的傷害與毀滅有時比真正的武器還要可怕。", sentence1: "網路霸凌逼死了那個無辜的女孩，真的是許多人倒在劍刃下，更多人則倒在舌頭下。", sentence2: "謠言的破壞力不容小覷，畢竟許多人倒在劍刃下，更多人則倒在舌頭下。", scene: "指言語的殺傷力極強，言語造成的傷害與毀滅有時比真正的武器還要可怕。" },
            { id: 306, term: "貪心不足", definition: "成語。貪得無厭，永遠不知滿足。", sentence1: "他已經賺了那麼多錢還想貪污，真是貪心不足，終將自食惡果。", sentence2: "做人要懂得知足，貪心不足的人往往會失去更多。", scene: "貪得無厭，永遠不知滿足。" },
            { id: 307, term: "野曠天低樹，江清月近人", definition: "詩詞名句 (出自孟浩然《宿建德江》)。原野空曠，遠處的天空彷彿比樹還低；江水清澈，映照的月亮似乎更親近人。形容景色空曠幽靜。", sentence1: "來到這片無人的草原露營，真有「野曠天低樹，江清月近人」的意境。", sentence2: "這幅畫作完美詮釋了野曠天低樹，江清月近人的寧靜之美。", scene: "原野空曠，遠處的天空彷彿比樹還低；江水清澈，映照的月亮似乎更親近人。形容景色空曠幽靜。" },
            { id: 308, term: "割雞焉用牛刀", definition: "諺語/成語。殺雞何必用宰牛的刀。比喻處理小事，毋需動用大才或大費周章。", sentence1: "處理這種小糾紛，派個基層員工去就行了，割雞焉用牛刀？", sentence2: "這點簡單的數學題，哪需要動用到微積分？真是割雞焉用牛刀。", scene: "殺雞何必用宰牛的刀。比喻處理小事，毋需動用大才或大費周章。" },
            { id: 309, term: "勝券在握", definition: "成語。比喻很有把握，相信自己一定能獲得勝利或成功。", sentence1: "經過長期的艱苦訓練，這支球隊對這次的冠軍已經勝券在握。", sentence2: "掌握了對方的致命弱點後，他在談判桌上顯得勝券在握。", scene: "比喻很有把握，相信自己一定能獲得勝利或成功。" },
            { id: 310, term: "博覽五車", definition: "成語。形容人讀的書很多，學識十分淵博。(同「學富五車」)", sentence1: "他從小就愛看書，如今已是個博覽五車的學者了。", sentence2: "想要寫出好文章，除了多加練習，更需要博覽五車的閱讀量。", scene: "形容人讀的書很多，學識十分淵博。(同「學富五車」)" },
            { id: 311, term: "善聽，才能贏得朋友", definition: "語錄。強調傾聽的重要性，懂得專心聽人說話，才能建立良好的人際關係。", sentence1: "他人緣極佳，因為他深知「善聽，才能贏得朋友」的溝通秘訣。", sentence2: "心理諮商師最重要的技巧就是善聽，才能贏得朋友與個案的信任。", scene: "強調傾聽的重要性，懂得專心聽人說話，才能建立良好的人際關係。" },
            { id: 312, term: "喋喋不休", definition: "成語。形容話說個不停，沒完沒了。", sentence1: "她一講到自己喜歡的偶像，就喋喋不休地說個沒完。", sentence2: "開會時請講重點，不要喋喋不休地抱怨不相關的事情。", scene: "形容話說個不停，沒完沒了。" },
            { id: 313, term: "單身貴族", definition: "流行語。指沒有家室牽絆，有獨立經濟能力，生活優渥自由的單身人士。", sentence1: "他很享受現在單身貴族的生活，假日總是到處旅遊。", sentence2: "越來越多的年輕人選擇成為單身貴族，把重心放在事業上。", scene: "指沒有家室牽絆，有獨立經濟能力，生活優渥自由的單身人士。" },
            { id: 314, term: "富貴在天，生死有命", definition: "諺語/語錄。指人的財富與壽命都是命中注定，人力無法勉強。勸人豁達。", sentence1: "面對不可抗力的天災，他感嘆地說：「富貴在天，生死有命啊。」", sentence2: "雖然凡事應盡力而為，但結果如何就當作富貴在天，生死有命吧。", scene: "指人的財富與壽命都是命中注定，人力無法勉強。勸人豁達。" },
            { id: 315, term: "惱羞成怒", definition: "成語。因感到羞愧到極點而轉為憤怒。", sentence1: "被當眾拆穿謊言後，他惱羞成怒地拍桌子大罵。", sentence2: "小偷被抓包後不僅不認錯，反而惱羞成怒地攻擊警察。", scene: "因感到羞愧到極點而轉為憤怒。" },
            { id: 316, term: "棒下出孝子", definition: "諺語。舊時觀念，認為用嚴厲的體罰才能教導出孝順、有規矩的孩子。", sentence1: "爺爺深信棒下出孝子的道理，對父親的管教非常嚴厲。", sentence2: "現代教育不再提倡「棒下出孝子」，而是強調愛的教育與溝通。", scene: "舊時觀念，認為用嚴厲的體罰才能教導出孝順、有規矩的孩子。" },
            { id: 317, term: "游泳知河深，談話知人心", definition: "諺語。比喻透過親自嘗試才能了解事物底細，透過與人交談才能看透對方的心思。", sentence1: "面試時多問幾個問題，畢竟游泳知河深，談話知人心。", sentence2: "我們要多和他接觸才能了解他，正如游泳知河深，談話知人心。", scene: "比喻透過親自嘗試才能了解事物底細，透過與人交談才能看透對方的心思。" },
            { id: 318, term: "渾然不知", definition: "成語。完全不知道。形容對事物毫無察覺。", sentence1: "小偷已經潛入家中，他卻在房間裡睡得渾然不知。", sentence2: "對於公司即將裁員的傳聞，他還渾然不知，每天照常上下班。", scene: "完全不知道。形容對事物毫無察覺。" },
            { id: 319, term: "無的放矢", definition: "成語。沒有目標地亂射箭。比喻說話或做事毫無目的，或憑空捏造、毫無根據地攻擊別人。", sentence1: "你的指控必須要有證據，不能這樣無的放矢。", sentence2: "寫文章要針對問題，不要無的放矢，否則讀者不知所云。", scene: "沒有目標地亂射箭。比喻說話或做事毫無目的，或憑空捏造、毫無根據地攻擊別人。" },
            { id: 320, term: "無風不起浪", definition: "諺語。沒有風就不會起波浪。比喻事情的發生必有其原因，傳言多半有其背景。", sentence1: "大家都說他要升官了，我看這件事無風不起浪，八成是真的。", sentence2: "既然有這個傳聞，必定是無風不起浪，我們最好調查一下。", scene: "沒有風就不會起波浪。比喻事情的發生必有其原因，傳言多半有其背景。" },
            { id: 321, term: "無微不至", definition: "成語。沒有一個細微的地方沒有照顧到。形容做事非常細心周到。", sentence1: "母親對生病的孩子照顧得無微不至。", sentence2: "這家飯店的服務無微不至，讓客人有賓至如歸的感覺。", scene: "沒有一個細微的地方沒有照顧到。形容做事非常細心周到。" },
            { id: 322, term: "無道人之短，無說己之長", definition: "語錄/警句 (出自《崔瑗．座右銘》)。不要談論別人的缺點，也不要誇耀自己的優點。", sentence1: "為人處世的最高境界，就是要做到無道人之短，無說己之長。", sentence2: "老師時常以「無道人之短，無說己之長」來勉勵我們培養謙虛的品德。", scene: "不要談論別人的缺點，也不要誇耀自己的優點。" },
            { id: 323, term: "無精打采", definition: "成語。形容精神不振，提不起勁的樣子。", sentence1: "他昨晚熬夜打電動，今天上課時無精打采的。", sentence2: "看那隻流浪狗無精打采地趴在路邊，真是可憐。", scene: "形容精神不振，提不起勁的樣子。" },
            { id: 324, term: "無憑無據", definition: "成語。沒有任何憑證或根據。", sentence1: "你不能單憑懷疑就指責他偷東西，這根本是無憑無據。", sentence2: "這些傳言都是無憑無據的，大家不要輕易相信。", scene: "沒有任何憑證或根據。" },
            { id: 325, term: "無獨有偶", definition: "成語。不只一個，竟然還有配對的。指兩項事物湊巧相同或類似。", sentence1: "昨天才發生一起車禍，無獨有偶，今天同個路段又撞車了。", sentence2: "他在路上撿到一個錢包，無獨有偶，他朋友昨天也撿到一個。", scene: "不只一個，竟然還有配對的。指兩項事物湊巧相同或類似。" },
            { id: 326, term: "無關痛癢", definition: "成語。比喻事情與自己毫無關係，或指無關緊要、沒有影響。", sentence1: "對於那些無關痛癢的批評，他向來一笑置之。", sentence2: "這些瑣事對大局來說無關痛癢，我們不必太過在意。", scene: "比喻事情與自己毫無關係，或指無關緊要、沒有影響。" },
            { id: 327, term: "痛改前非", definition: "成語。徹底改正以往的過錯。", sentence1: "經過這次的教訓，他發誓要痛改前非，重新做人。", sentence2: "只要他願意痛改前非，我們就應該給他一個自新的機會。", scene: "徹底改正以往的過錯。" },
            { id: 328, term: "登高必自卑，行遠必自邇", definition: "語錄 (出自《中庸》)。登高山必須從低處開始，走遠路必須從近處開始。比喻做事要循序漸進，由淺入深。", sentence1: "學習任何技能都不能好高騖遠，因為登高必自卑，行遠必自邇。", sentence2: "創業的過程是登高必自卑，行遠必自邇，必須一步一腳印地打拚。", scene: "登高山必須從低處開始，走遠路必須從近處開始。比喻做事要循序漸進，由淺入深。" },
            { id: 329, term: "稀奇古怪", definition: "成語。指很少見、很奇特，或是奇怪得不合常理。", sentence1: "這家古董店裡擺滿了各種稀奇古怪的玩意兒。", sentence2: "他腦袋裡總是裝著一些稀奇古怪的想法。", scene: "指很少見、很奇特，或是奇怪得不合常理。" },
            { id: 330, term: "結結巴巴", definition: "詞語。形容說話不流利，口吃或因為緊張而語塞的樣子。", sentence1: "他一看到暗戀的女生，說話就變得結結巴巴的。", sentence2: "被老師抽問時，他因為沒準備而結結巴巴地答不出話來。", scene: "形容說話不流利，口吃或因為緊張而語塞的樣子。" },
            { id: 331, term: "結實纍纍", definition: "成語。形容果實長得非常多，掛滿枝頭的樣子。", sentence1: "秋天到了，果園裡的蘋果樹結實纍纍，大豐收。", sentence2: "看到葡萄架上結實纍纍，農夫的臉上露出了滿意的笑容。", scene: "形容果實長得非常多，掛滿枝頭的樣子。" },
            { id: 332, term: "絕世美女", definition: "詞語。形容容貌極度美麗，世上罕見的女子。", sentence1: "傳說中的貂蟬是一位傾國傾城的絕世美女。", sentence2: "她穿上這套晚禮服，簡直就像畫裡走出來的絕世美女。", scene: "形容容貌極度美麗，世上罕見的女子。" },
            { id: 333, term: "絕妙好辭", definition: "成語。形容極為精妙、優美的文辭或語句。", sentence1: "曹娥碑背後的「黃絹幼婦，外孫齏臼」被解讀為絕妙好辭的典故。", sentence2: "這篇散文用字遣詞優美，堪稱絕妙好辭。", scene: "形容極為精妙、優美的文辭或語句。" },
            { id: 334, term: "絮絮叨叨", definition: "成語。形容說話囉嗦，嘮叨不休。", sentence1: "奶奶總是絮絮叨叨地叮嚀我們出門要小心。", sentence2: "他一喝醉就開始絮絮叨叨地抱怨生活的不如意。", scene: "形容說話囉嗦，嘮叨不休。" },
            { id: 335, term: "脾氣嘴巴不好，心地再好也不能算好人", definition: "證嚴法師靜思語。指即使內心善良，若言語傷人、脾氣暴躁，也會對他人造成傷害，不能自稱為好人。", sentence1: "溝通時要控制情緒，要知道脾氣嘴巴不好，心地再好也不能算好人。", sentence2: "真正的善良應該表裡如一，畢竟脾氣嘴巴不好，心地再好也不能算好人。", scene: "指即使內心善良，若言語傷人、脾氣暴躁，也會對他人造成傷害，不能自稱為好人。" },
            { id: 336, term: "虛心受教", definition: "詞語。謙虛地接受別人的教導或批評。", sentence1: "對於前輩的指導，他總是虛心受教，因此進步神速。", sentence2: "無論受到怎樣的批評，我們都應該保持虛心受教的態度。", scene: "謙虛地接受別人的教導或批評。" },
            { id: 337, term: "虛心檢討", definition: "詞語。謙虛地反省、檢察自己的過失與缺點。", sentence1: "這次活動辦得不夠完美，我們事後必須開會虛心檢討。", sentence2: "犯錯不可恥，最重要的是能虛心檢討，不再重蹈覆轍。", scene: "謙虛地反省、檢察自己的過失與缺點。" },
            { id: 338, term: "開卷有益", definition: "成語。打開書本閱讀，就能得到好處。鼓勵人多讀書。", sentence1: "老師常勉勵我們多跑圖書館，因為開卷有益，能增廣見聞。", sentence2: "即使只是一本小雜誌，有時也能帶來開卷有益的啟發。", scene: "打開書本閱讀，就能得到好處。鼓勵人多讀書。" },
            { id: 339, term: "陽奉陰違", definition: "成語。表面上遵從奉承，暗地裡卻違背不照辦。", sentence1: "他對長官的命令總是陽奉陰違，其實都在做自己的事。", sentence2: "這種陽奉陰違的部屬，對公司的發展是一大隱患。", scene: "表面上遵從奉承，暗地裡卻違背不照辦。" },
            { id: 340, term: "傷人又傷己", definition: "詞語。對別人造成傷害，同時也讓自己受到損害。多指憤怒、報復或惡言。", sentence1: "吵架時說出惡毒的話，往往是傷人又傷己的行為。", sentence2: "互相報復只會陷入惡性循環，最終落得傷人又傷己的下場。", scene: "對別人造成傷害，同時也讓自己受到損害。多指憤怒、報復或惡言。" },
            { id: 341, term: "惹人討厭", definition: "詞語。引起別人的反感、厭惡。", sentence1: "他總是喜歡在別人背後說壞話，這種行為真的很惹人討厭。", sentence2: "在公共場所大聲喧嘩，是非常惹人討厭的舉動。", scene: "引起別人的反感、厭惡。" },
            { id: 342, term: "惹人厭", definition: "詞語。同「惹人討厭」，讓人感到厭煩不喜歡。", sentence1: "他那種自以為是、驕傲自大的態度，實在很惹人厭。", sentence2: "一直重複講同樣的笑話，聽久了也會變得惹人厭。", scene: "同「惹人討厭」，讓人感到厭煩不喜歡。" },
            { id: 343, term: "惹人憐愛", definition: "詞語。引起別人的憐惜與喜愛。", sentence1: "那隻流浪小貓水汪汪的大眼睛，真是惹人憐愛。", sentence2: "小女孩委屈得直掉眼淚，那模樣十分惹人憐愛。", scene: "引起別人的憐惜與喜愛。" },
            { id: 344, term: "意氣風發", definition: "成語。形容精神振奮，志氣昂揚的樣子。", sentence1: "他剛拿下了創業大賽的首獎，整個人顯得意氣風發。", sentence2: "這群年輕人意氣風發地朝著自己的夢想邁進。", scene: "形容精神振奮，志氣昂揚的樣子。" },
            { id: 345, term: "愚昧人若靜默不言，也可算為智慧", definition: "語錄 (聖經箴言)。指無知的人如果懂得閉嘴不亂說話，別人就看不出他的愚笨，這也算是一種聰明的表現。", sentence1: "不懂裝懂最容易鬧笑話，畢竟愚昧人若靜默不言，也可算為智慧。", sentence2: "在專家面前最好少開口，要知道愚昧人若靜默不言，也可算為智慧。", scene: "指無知的人如果懂得閉嘴不亂說話，別人就看不出他的愚笨，這也算是一種聰明的表現。" },
            { id: 346, term: "愛睏", definition: "詞語 (源自閩南語)。想睡覺、睏倦。", sentence1: "昨晚熬夜趕報告，現在上課覺得好愛睏。", sentence2: "吃飽飯後血液集中在胃部，人就容易感到愛睏。", scene: "想睡覺、睏倦。" },
            { id: 347, term: "慈烏跪乳", definition: "典故/成語。傳說小烏鴉長大後，會反哺餵養老烏鴉，並且跪著餵食。比喻子女懂得孝順、報答父母養育之恩。", sentence1: "動物尚有慈烏跪乳之義，身為萬物之靈的人類更應懂得孝順父母。", sentence2: "父母辛勤養育我們，我們應當效法慈烏跪乳，盡心侍奉他們。", scene: "傳說小烏鴉長大後，會反哺餵養老烏鴉，並且跪著餵食。比喻子女懂得孝順、報答父母養育之恩。" },
            { id: 348, term: "搏扶搖而直上", definition: "詩詞名句/成語 (出自《莊子》)。大鵬鳥拍擊著旋風，直飛上九萬里的高空。比喻事物迅速發展，或人得到機會飛黃騰達。", sentence1: "只要抓住了這波市場機遇，公司的業績必定能搏扶搖而直上。", sentence2: "憑藉著傑出的才華，他在政壇上搏扶搖而直上，平步青雲。", scene: "大鵬鳥拍擊著旋風，直飛上九萬里的高空。比喻事物迅速發展，或人得到機會飛黃騰達。" },
            { id: 349, term: "搖脣鼓舌", definition: "成語。揮動嘴脣，鼓動舌頭。比喻利用口才挑撥是非，或到處遊說煽動。", sentence1: "這群政客整天只會搖脣鼓舌，卻拿不出一點實際的政績。", sentence2: "他靠著搖脣鼓舌到處騙取好處，大家千萬別上當。", scene: "揮動嘴脣，鼓動舌頭。比喻利用口才挑撥是非，或到處遊說煽動。" },
            { id: 350, term: "搬口弄舌", definition: "成語。把別人說的話傳來傳去，蓄意挑撥是非。(同「搬弄是非」)", sentence1: "鄰居們都很討厭那個喜歡搬口弄舌、製造糾紛的婦人。", sentence2: "團隊裡最怕有這種搬口弄舌的人，會破壞大家的團結。", scene: "把別人說的話傳來傳去，蓄意挑撥是非。(同「搬弄是非」)" },
            { id: 351, term: "新陳代謝", definition: "詞語。生物體內物質與能量不斷更新的過程。比喻新事物取代舊事物。", sentence1: "多運動喝水可以促進身體的新陳代謝，對健康有益。", sentence2: "企業必須不斷吸收新血，促進組織的新陳代謝，才能保持競爭力。", scene: "生物體內物質與能量不斷更新的過程。比喻新事物取代舊事物。" },
            { id: 352, term: "會心處不必在遠，翳然林水，便自有濠濮閒想也", definition: "語錄 (出自《世說新語》)。領悟美好意境不一定要到遠方，只要有隱蔽的樹林水邊，就能生出如莊子般悠閒脫俗的奇想。", sentence1: "週末到附近的公園散步，體會到了「會心處不必在遠，翳然林水」的愜意。", sentence2: "不用特地出國度假，在自家陽台種滿盆栽，也能有會心處不必在遠的閒想。", scene: "領悟美好意境不一定要到遠方，只要有隱蔽的樹林水邊，就能生出如莊子般悠閒脫俗的奇想。" },
            { id: 353, term: "楚澤", definition: "詞語/借代。楚地的水澤。常指屈原被流放的江南一帶，也借指失意文人流連的江湖山野。", sentence1: "屈原流放楚澤，寫下了千古流傳的《離騷》。", sentence2: "他仕途不順，只能退居楚澤，過著隱士般的生活。", scene: "楚地的水澤。常指屈原被流放的江南一帶，也借指失意文人流連的江湖山野。" },
            { id: 354, term: "溫飽無虞", definition: "成語。吃得飽、穿得暖，不用憂慮基本的生活需求。", sentence1: "在太平盛世，人民只要肯努力，通常都能溫飽無虞。", sentence2: "父母辛勤工作，只為了讓孩子能過上溫飽無虞的日子。", scene: "吃得飽、穿得暖，不用憂慮基本的生活需求。" },
            { id: 355, term: "睥睨天下", definition: "成語。斜著眼看天下。形容態度極為高傲，看不起天下所有人，或形容氣勢非常霸道雄偉。", sentence1: "那位霸主站在城牆上，展現出睥睨天下的王者氣勢。", sentence2: "他不過是有了點小成就，就一副睥睨天下的樣子，真是夜郎自大。", scene: "斜著眼看天下。形容態度極為高傲，看不起天下所有人，或形容氣勢非常霸道雄偉。" },
            { id: 356, term: "稗官野史", definition: "成語。稗官，古代的小官；野史，私家編撰的史書。指街談巷說的傳聞，或非正史所記載的小說與民間故事。", sentence1: "這些講述宮廷秘辛的連續劇，大多改編自稗官野史，不可盡信。", sentence2: "他對正史沒興趣，反而喜歡研究那些稗官野史裡的奇人異事。", scene: "稗官，古代的小官；野史，私家編撰的史書。指街談巷說的傳聞，或非正史所記載的小說與民間故事。" },
            { id: 357, term: "腹中矛戟森然", definition: "成語。肚子裡充滿了刀槍劍戟。比喻人心機深沉，暗懷殺機或充滿敵意。", sentence1: "那個人表面和善，其實腹中矛戟森然，隨時準備算計別人。", sentence2: "在這爾虞我詐的商場裡，許多對手都是腹中矛戟森然。", scene: "肚子裡充滿了刀槍劍戟。比喻人心機深沉，暗懷殺機或充滿敵意。" },
            { id: 358, term: "落英繽紛", definition: "成語。落花繁多而紛亂地掉落。形容春末落花紛飛的美麗情景。", sentence1: "春風吹過櫻花林，只見落英繽紛，宛如仙境。", sentence2: "走在落英繽紛的步道上，讓人感到無比的浪漫。", scene: "落花繁多而紛亂地掉落。形容春末落花紛飛的美麗情景。" },
            { id: 359, term: "話不投機", definition: "成語。雙方觀點不同，談不攏。(常接「半句多」)", sentence1: "他們倆立場完全相反，真是話不投機半句多，沒幾分鐘就不歡而散。", sentence2: "既然話不投機，我們也就不必再繼續討論下去了。", scene: "雙方觀點不同，談不攏。(常接「半句多」)" },
            { id: 360, term: "話匣子", definition: "詞語。比喻話多的人，或指引發談話的開端。", sentence1: "一聊到他最喜歡的籃球，他的話匣子就打開了，停都停不下來。", sentence2: "幾杯黃湯下肚後，老李打開了話匣子，說起了當年的勇事。", scene: "比喻話多的人，或指引發談話的開端。" },
            { id: 361, term: "話到舌間留半句，事臨頭上用三思", definition: "諺語/警句。勸人說話要有所保留，遇到事情要反覆思考後再行動。", sentence1: "職場生存法則就是要懂得「話到舌間留半句，事臨頭上用三思」。", sentence2: "不要總是口無遮攔，記住話到舌間留半句，才不會無意中得罪人。", scene: "勸人說話要有所保留，遇到事情要反覆思考後再行動。" },
            { id: 362, term: "話說得合宜，如金蘋果落在銀網子裡", definition: "語錄 (聖經箴言)。比喻說話恰當、得體，極其美好且珍貴。", sentence1: "主持人一句巧妙的圓場，正所謂話說得合宜，如金蘋果落在銀網子裡。", sentence2: "懂得讚美別人，那話語就如同金蘋果落在銀網子裡般閃耀動人。", scene: "比喻說話恰當、得體，極其美好且珍貴。" },
            { id: 363, term: "路不拾遺", definition: "成語。路上有別人遺失的東西，也沒人會撿走據為己有。形容社會風氣良好，治安佳。", sentence1: "在古代的太平盛世，據說能做到夜不閉戶、路不拾遺。", sentence2: "這個社區的居民素質很高，經常有路不拾遺的善舉發生。", scene: "路上有別人遺失的東西，也沒人會撿走據為己有。形容社會風氣良好，治安佳。" },
            { id: 364, term: "路遙知馬力，日久見人心", definition: "諺語。路途遙遠才能看出馬的耐力，相處久了才能看出人心的善惡。", sentence1: "雖然他一開始表現冷淡，但路遙知馬力，日久見人心，後來證明他是個很講義氣的朋友。", sentence2: "你別急著下定論，路遙知馬力，日久見人心，時間會證明一切的。", scene: "路途遙遠才能看出馬的耐力，相處久了才能看出人心的善惡。" },
            { id: 365, term: "運將", definition: "詞語 (源自日語，台語發音)。指計程車司機或職業駕駛。", sentence1: "那位熱心的運將大哥，不但幫忙搬行李，還熱情地介紹當地美食。", sentence2: "為了多賺點錢，許多運將都必須熬夜開車，非常辛苦。", scene: "指計程車司機或職業駕駛。" },
            { id: 366, term: "道聽塗說", definition: "成語。在路上聽到沒有根據的傳聞，就在路邊散布出去。指沒有經過證實的傳言。", sentence1: "關於他要離婚的消息，只是道聽塗說，根本沒有這回事。", sentence2: "這種道聽塗說的謠言，聰明人是不會相信的。", scene: "在路上聽到沒有根據的傳聞，就在路邊散布出去。指沒有經過證實的傳言。" },
            { id: 367, term: "酩酊爛醉", definition: "成語。形容醉得非常厲害，神志不清。", sentence1: "尾牙宴上，許多同事都喝得酩酊爛醉，連站都站不穩。", sentence2: "他因為失戀而借酒澆愁，最後酩酊爛醉地倒在路邊。", scene: "形容醉得非常厲害，神志不清。" },
            { id: 368, term: "慷慨解囊", definition: "成語。毫不吝嗇地拿出錢財來幫助別人。", sentence1: "看到災民的慘況，企業家們紛紛慷慨解囊，捐出巨款賑災。", sentence2: "為了幫助弱勢學童，他慷慨解囊捐贈了一百萬。", scene: "毫不吝嗇地拿出錢財來幫助別人。" },
            { id: 369, term: "截然不同", definition: "成語。形容兩件事物毫無共同之處，完全不一樣。", sentence1: "這兩兄弟雖然是雙胞胎，但個性卻截然不同。", sentence2: "換了新導演後，這部電影的風格與前一集截然不同。", scene: "形容兩件事物毫無共同之處，完全不一樣。" },
            { id: 370, term: "槓龜", definition: "詞語 (源自日語/台語諧音)。指賭博或抽獎沒有中獎，落空。", sentence1: "買了好幾張彩券，結果全部都槓龜了。", sentence2: "他連續參加了五次抽獎活動，每次都槓龜，運氣真差。", scene: "指賭博或抽獎沒有中獎，落空。" },
            { id: 371, term: "禍不單行", definition: "成語。不幸的事情接連發生。(常與「福無雙至」連用)", sentence1: "才剛弄丟了錢包又摔斷了腿，他真的是禍不單行。", sentence2: "發生火災後又遇到豪雨，這個村莊可說是禍不單行。", scene: "不幸的事情接連發生。(常與「福無雙至」連用)" },
            { id: 372, term: "禍國殃民", definition: "成語。使國家受害，使百姓遭殃。", sentence1: "歷史上那些貪贓枉法、禍國殃民的奸臣，都會留下千古罵名。", sentence2: "販賣毒品是禍國殃民的行為，絕對不能寬容。", scene: "使國家受害，使百姓遭殃。" },
            { id: 373, term: "禍從口出", definition: "成語。災禍往往是因為說話不謹慎而引起的。", sentence1: "你別再亂講話了，難道不知道禍從口出這個道理嗎？", sentence2: "他因為在網路上的一句失言而遭到封殺，真是禍從口出。", scene: "災禍往往是因為說話不謹慎而引起的。" },
            { id: 374, term: "禍莫大於多言", definition: "警句。最大的災禍莫過於話太多、亂說話。勸人謹言慎行。", sentence1: "古人常告誡我們禍莫大於多言，少說話多做事才是明哲保身之道。", sentence2: "在複雜的人際關係中，他深知禍莫大於多言，總是保持低調。", scene: "最大的災禍莫過於話太多、亂說話。勸人謹言慎行。" },
            { id: 375, term: "福壽全歸", definition: "成語。多用作對年高德劭者壽終正寢的輓辭。指福氣與壽命都很圓滿地結束。", sentence1: "老爺爺活到了九十多歲才安詳辭世，真可說是福壽全歸了。", sentence2: "訃聞上寫著「福壽全歸」，表達了對逝者圓滿一生的敬意。", scene: "多用作對年高德劭者壽終正寢的輓辭。指福氣與壽命都很圓滿地結束。" },
            { id: 376, term: "精彩絕倫", definition: "成語。形容非常出色，沒有任何東西可以相比。", sentence1: "馬戲團的空中飛人表演得精彩絕倫，讓觀眾驚呼連連。", sentence2: "這場冠軍賽雙方你來我往，真是一場精彩絕倫的對決。", scene: "形容非常出色，沒有任何東西可以相比。" },
            { id: 377, term: "維妙維肖", definition: "成語。形容模仿或製作得非常逼真，與真的一模一樣。", sentence1: "這尊蠟像做得維妙維肖，連臉上的皺紋都清晰可見。", sentence2: "他模仿那位歌手的聲音和動作，簡直是維妙維肖。", scene: "形容模仿或製作得非常逼真，與真的一模一樣。" },
            { id: 378, term: "語無倫次", definition: "成語。形容說話顛三倒四，沒有條理。", sentence1: "他發高燒燒得神志不清，開始語無倫次地說起胡話來。", sentence2: "極度驚嚇之下，目擊者語無倫次，無法清楚描述歹徒的長相。", scene: "形容說話顛三倒四，沒有條理。" },
            { id: 379, term: "賓主盡歡", definition: "成語。客人和主人都感到非常高興、滿意。", sentence1: "在主人的熱情款待下，這場晚宴辦得非常成功，賓主盡歡。", sentence2: "經過幾輪愉快的交涉，雙方簽訂了合約，真可謂賓主盡歡。", scene: "客人和主人都感到非常高興、滿意。" },
            { id: 380, term: "輕聲細語說重話", definition: "詞語/溝通技巧。用溫和輕柔的語氣，表達嚴肅或責備的內容，往往更具威嚴與說服力。", sentence1: "母親沒有大聲責罵，只是輕聲細語說重話，反而讓孩子感到無比羞愧。", sentence2: "高段的主管懂得輕聲細語說重話，既不傷和氣又能點出部屬的嚴重錯誤。", scene: "用溫和輕柔的語氣，表達嚴肅或責備的內容，往往更具威嚴與說服力。" },
            { id: 381, term: "遠交近攻", definition: "成語。結交遠方的國家，攻擊鄰近的國家。古代的外交、軍事策略。", sentence1: "戰國時期秦國採用遠交近攻的策略，最終統一了六國。", sentence2: "企業在拓展市場時，有時也會運用類似遠交近攻的商業戰略。", scene: "結交遠方的國家，攻擊鄰近的國家。古代的外交、軍事策略。" },
            { id: 382, term: "銘感於心", definition: "成語。深刻地感激在心裡。", sentence1: "對於您在我們最困難時給予的幫助，我們全家人都銘感於心。", sentence2: "老師的諄諄教誨，我將永遠銘感於心。", scene: "深刻地感激在心裡。" },
            { id: 383, term: "撥弄是非", definition: "成語。挑起事端，製造糾紛。", sentence1: "那個心機很重的人，總是喜歡在同事之間撥弄是非。", sentence2: "我們不要聽信那個愛撥弄是非的人的話，免得破壞了感情。", scene: "挑起事端，製造糾紛。" },
            { id: 384, term: "暴戾不安", definition: "詞語。形容情緒極度暴躁、凶狠，且焦躁不安。", sentence1: "被關在籠子裡的老虎顯得暴戾不安，不斷地來回走動。", sentence2: "這場暴動讓整個城市的氣氛變得暴戾不安。", scene: "形容情緒極度暴躁、凶狠，且焦躁不安。" },
            { id: 385, term: "暴飲暴食", definition: "成語。毫無節制地大量吃喝。", sentence1: "為了身體健康，我們應該定時定量，千萬不要暴飲暴食。", sentence2: "壓力大時他就會暴飲暴食，結果導致腸胃炎發作。", scene: "毫無節制地大量吃喝。" },
            { id: 386, term: "樂不可支", definition: "成語。快樂到了極點，撐持不住。形容極度高興。", sentence1: "聽到自己中了頭獎的消息，他樂不可支地跳了起來。", sentence2: "孩子們拿到了新年紅包，個個樂不可支。", scene: "快樂到了極點，撐持不住。形容極度高興。" },
            { id: 387, term: "翩翩起舞", definition: "成語。輕捷飄逸地跳起舞來。", sentence1: "隨著優美的華爾滋音樂響起，一對對舞伴在舞池中翩翩起舞。", sentence2: "蝴蝶在花叢中翩翩起舞，景色十分迷人。", scene: "輕捷飄逸地跳起舞來。" },
            { id: 388, term: "諄諄教誨", definition: "成語。懇切耐心地教導。", sentence1: "畢業多年後，我依然牢記著班導師當年的諄諄教誨。", sentence2: "父母的諄諄教誨，是他做人處事的最高指導原則。", scene: "懇切耐心地教導。" },
            { id: 389, term: "論長道短", definition: "成語。議論別人的好壞是非。", sentence1: "鄰居們聚在巷口論長道短，談論著社區裡的八卦。", sentence2: "與其在背後論長道短，不如當面把問題說清楚。", scene: "議論別人的好壞是非。" },
            { id: 390, term: "豬八戒的脊梁", definition: "歇後語 (後接「無能之輩」或「悟能之背」)。利用《西遊記》中豬八戒法號「悟能」的諧音，比喻沒有能力的人。", sentence1: "這個專案交給他負責，簡直是豬八戒的脊梁——無能之輩，肯定會搞砸。", sentence2: "你別指望他能幫上什麼忙，他就是個豬八戒的脊梁。", scene: "利用《西遊記》中豬八戒法號「悟能」的諧音，比喻沒有能力的人。" },
            { id: 391, term: "賣關子", definition: "詞語。在關鍵處故意停頓，不把話說完，藉以引起別人的好奇心或懸念。", sentence1: "你就別再賣關子了，趕快把最後的結局告訴我們吧！", sentence2: "推理小說家最擅長在章節末尾賣關子，吸引讀者繼續看下去。", scene: "在關鍵處故意停頓，不把話說完，藉以引起別人的好奇心或懸念。" },
            { id: 392, term: "適得其反", definition: "成語。結果恰好與原來的願望或目的相反。", sentence1: "父母過度保護孩子，反而會剝奪他們學習獨立的機會，真是適得其反。", sentence2: "採用這種高壓的管理方式，不但無法提高效率，反而會適得其反。", scene: "結果恰好與原來的願望或目的相反。" },
            { id: 393, term: "醉不上道", definition: "宣導語。喝醉酒絕對不開車上路，以確保交通安全。", sentence1: "為了你我和家人的安全，請務必遵守「喝酒不開車，醉不上道」的原則。", sentence2: "聚餐時若喝了酒，就應該叫計程車回家，堅持醉不上道。", scene: "喝醉酒絕對不開車上路，以確保交通安全。" },
            { id: 394, term: "養兵千日，用在一時", definition: "諺語。平時長期供養訓練軍隊，是為了在關鍵的時刻能夠派上用場。比喻平時的準備是為了緊急時的需要。", sentence1: "消防員每天辛勤演練，正是為了養兵千日，用在一時，能在火場中救人。", sentence2: "平時努力存錢，就是為了養兵千日，用在一時，以備不時之需。", scene: "平時長期供養訓練軍隊，是為了在關鍵的時刻能夠派上用場。比喻平時的準備是為了緊急時的需要。" },
            { id: 395, term: "學而時習之", definition: "語錄 (出自《論語》)。學習了知識之後，要在適當的時機去溫習和實踐它。", sentence1: "讀書不能只靠死記，必須學而時習之，才能真正轉化為自己的能力。", sentence2: "老師要求我們每天複習功課，就是要我們養成學而時習之的好習慣。", scene: "學習了知識之後，要在適當的時機去溫習和實踐它。" },
            { id: 396, term: "融會貫通", definition: "成語。將各種知識或事物融合貫穿，從而獲得全面透徹的理解。", sentence1: "學習歷史不能只背年代，要能融會貫通，了解事件背後的因果關係。", sentence2: "他把中西醫學的理論融會貫通，發展出了一套獨特的治療方法。", scene: "將各種知識或事物融合貫穿，從而獲得全面透徹的理解。" },
            { id: 397, term: "諱疾忌醫", definition: "成語。怕人知道有病而不肯就醫。比喻掩飾過失，不願聽取別人的勸告或批評。", sentence1: "公司經營出了問題就該立刻處理，若諱疾忌醫，只會讓情況更糟。", sentence2: "知道自己有缺點就應該改進，諱疾忌醫是無法進步的。", scene: "怕人知道有病而不肯就醫。比喻掩飾過失，不願聽取別人的勸告或批評。" },
            { id: 398, term: "謔而不虐", definition: "成語。開玩笑卻不致於傷人，有分寸。", sentence1: "主持人的幽默感恰到好處，謔而不虐，讓全場氣氛非常輕鬆。", sentence2: "朋友之間互相開玩笑可以，但要注意謔而不虐，別傷了和氣。", scene: "開玩笑卻不致於傷人，有分寸。" },
            { id: 399, term: "辦桌", definition: "詞語 (源自閩南語)。指在戶外搭棚，舉辦豐盛的筵席，常見於婚喪喜慶。", sentence1: "鄉下人家娶媳婦，通常都會請總舖師來村口辦桌請客。", sentence2: "今晚廟會非常熱鬧，廣場上擺了上百桌的辦桌來宴請信徒。", scene: "指在戶外搭棚，舉辦豐盛的筵席，常見於婚喪喜慶。" },
            { id: 400, term: "隨心所欲", definition: "成語。順隨自己的心意，想做什麼就做什麼。", sentence1: "退休後，他終於可以隨心所欲地安排自己的時間，到處去旅行了。", sentence2: "藝術創作需要自由的空間，才能讓畫家隨心所欲地揮灑靈感。", scene: "順隨自己的心意，想做什麼就做什麼。" },
            { id: 401, term: "雕蟲小技", definition: "成語。比喻微不足道的技能。", sentence1: "這點雕蟲小技，在專家面前根本不值一提。", sentence2: "魔術師謙虛地說這只是雕蟲小技。", scene: "比喻微不足道的技能。" },
            { id: 402, term: "頭家", definition: "詞語 (閩南語)。指老闆或一家之主。", sentence1: "我們頭家對員工很好，福利給得很大方。", sentence2: "自己出來創業當頭家，雖然辛苦但很自由。", scene: "指老闆或一家之主。" },
            { id: 403, term: "龍飛鳳舞", definition: "成語。形容山勢蜿蜒起伏，氣勢磅礴；也形容書法筆勢奔放，生動活潑。", sentence1: "這幅草書寫得龍飛鳳舞，氣勢非凡。", sentence2: "遠眺群山，龍飛鳳舞，景色十分壯麗。", scene: "形容山勢蜿蜒起伏，氣勢磅礴；也形容書法筆勢奔放，生動活潑。" },
            { id: 404, term: "應聲蟲", definition: "詞語。比喻自己沒有主見，只會附和別人的人。", sentence1: "他在會議上就像個應聲蟲，老闆說什麼他都點頭。", sentence2: "我們需要的是有獨立思考能力的員工，而不是應聲蟲。", scene: "比喻自己沒有主見，只會附和別人的人。" },
            { id: 405, term: "擊鼓申冤", definition: "成語。古人有冤情時，到衙門外擊鼓，請求官員審理。", sentence1: "為了洗刷父親的冤屈，他毅然上京擊鼓申冤。", sentence2: "這部古裝劇中，女主角擊鼓申冤的橋段令人動容。", scene: "古人有冤情時，到衙門外擊鼓，請求官員審理。" },
            { id: 406, term: "瞵視昂藏", definition: "成語。形容雄鷹注視獵物，神態威武的樣子。比喻人氣宇軒昂，神態威武。", sentence1: "站在山頂上的他，瞵視昂藏，頗有大將之風。", sentence2: "這隻獵犬瞵視昂藏，看起來非常機警。", scene: "形容雄鷹注視獵物，神態威武的樣子。比喻人氣宇軒昂，神態威武。" },
            { id: 407, term: "矯揉造作", definition: "成語。刻意做作，極不自然。", sentence1: "她的演技太過矯揉造作，讓人看了很不舒服。", sentence2: "他那矯揉造作的態度，反而讓人覺得他不夠真誠。", scene: "刻意做作，極不自然。" },
            { id: 408, term: "縱虎歸山，後患無窮", definition: "諺語。把老虎放回山林，將來一定會留下禍患。比喻放走敵人，將給自己帶來嚴重的後果。", sentence1: "對待這種惡徒絕不能心慈手軟，否則縱虎歸山，後患無窮。", sentence2: "警方堅持不接受歹徒的條件，以免縱虎歸山，後患無窮。", scene: "把老虎放回山林，將來一定會留下禍患。比喻放走敵人，將給自己帶來嚴重的後果。" },
            { id: 409, term: "縱橫捭闔", definition: "成語。指在政治或外交上運用手段進行聯合或分化。", sentence1: "戰國時代的策士們縱橫捭闔，遊說各國君主。", sentence2: "他在商場上縱橫捭闔，成功併購了許多競爭對手。", scene: "指在政治或外交上運用手段進行聯合或分化。" },
            { id: 410, term: "聲勢浩大", definition: "成語。聲威和氣勢非常壯大。", sentence1: "這次的抗議遊行聲勢浩大，引起了政府的高度重視。", sentence2: "敵軍聲勢浩大地逼近城牆，守軍嚴陣以待。", scene: "聲威和氣勢非常壯大。" },
            { id: 411, term: "臨危授命", definition: "成語。在危急的時刻被任命擔任重任。", sentence1: "國家面臨經濟危機，他臨危授命擔任財政部長。", sentence2: "公司瀕臨破產，這位新總經理臨危授命，希望能扭轉乾坤。", scene: "在危急的時刻被任命擔任重任。" },
            { id: 412, term: "臨門一腳", definition: "成語。足球比賽中將球踢進球門前的最後一腳。比喻事情到了最後、最關鍵的步驟。", sentence1: "這個專案就差你這臨門一腳了，趕快把報告交出來吧。", sentence2: "他的幫忙就像是臨門一腳，讓我們的計畫順利成功。", scene: "足球比賽中將球踢進球門前的最後一腳。比喻事情到了最後、最關鍵的步驟。" },
            { id: 413, term: "臨陣磨槍", definition: "成語。到了陣前才磨銳兵器。比喻事態急迫才匆忙準備。(常接「不亮也光」)", sentence1: "明天就要考試了，你現在才臨陣磨槍，來得及嗎？", sentence2: "雖然是臨陣磨槍，但總比什麼都不準備來得好。", scene: "到了陣前才磨銳兵器。比喻事態急迫才匆忙準備。(常接「不亮也光」)" },
            { id: 414, term: "臨機應變", definition: "成語。遇到突發狀況時，能靈活應對，想出解決辦法。", sentence1: "身為主持人，必須具備臨機應變的能力，才能掌控全場。", sentence2: "突如其來的停電，考驗著主辦單位的臨機應變能力。", scene: "遇到突發狀況時，能靈活應對，想出解決辦法。" },
            { id: 415, term: "講一個影，生一個囝", definition: "諺語 (閩南語)。聽到一點風聲就穿鑿附會，大肆渲染。比喻捕風捉影，造謠生事。", sentence1: "這種八卦新聞通常都是講一個影，生一個囝，不能當真。", sentence2: "鄰居最喜歡講一個影，生一個囝，大家都很受不了。", scene: "聽到一點風聲就穿鑿附會，大肆渲染。比喻捕風捉影，造謠生事。" },
            { id: 416, term: "謠言止於智者", definition: "諺語。沒有根據的傳言，到了聰明人那裡就會停止傳播。", sentence1: "對於這些不實的指控，我們相信謠言止於智者。", sentence2: "面對網路上的流言蜚語，我們要保持理智，畢竟謠言止於智者。", scene: "沒有根據的傳言，到了聰明人那裡就會停止傳播。" },
            { id: 417, term: "豁然開朗", definition: "成語。形容由狹窄幽暗突然變得寬闊明亮；也比喻突然領悟某種道理或心情變得開朗。", sentence1: "走出隧道，眼前的風景豁然開朗，令人心曠神怡。", sentence2: "聽了老師的解說，他心中的疑惑豁然開朗。", scene: "形容由狹窄幽暗突然變得寬闊明亮；也比喻突然領悟某種道理或心情變得開朗。" },
            { id: 418, term: "鞠躬盡瘁的諸葛亮", definition: "典故/歷史人物。三國時蜀漢丞相諸葛亮，為了國家大事耗盡心力。比喻恭敬謹慎，不辭勞苦地盡力奉獻。", sentence1: "他為了公司的發展，就像鞠躬盡瘁的諸葛亮一樣，日夜操勞。", sentence2: "這位老校長將一生奉獻給教育，真可謂鞠躬盡瘁的諸葛亮。", scene: "三國時蜀漢丞相諸葛亮，為了國家大事耗盡心力。比喻恭敬謹慎，不辭勞苦地盡力奉獻。" },
            { id: 419, term: "點石成金", definition: "成語。神仙用手指一點，石頭就變成黃金。比喻修改文章時，稍微改動幾個字，就能使文章變得非常出色。", sentence1: "經過老師的點石成金，這篇作文的意境提升了不少。", sentence2: "這位名醫醫術高明，許多病危的患者經過他的治療都能奇蹟般康復，宛如點石成金。", scene: "神仙用手指一點，石頭就變成黃金。比喻修改文章時，稍微改動幾個字，就能使文章變得非常出色。" },
            { id: 420, term: "穠纖合度", definition: "成語。胖瘦恰到好處。多用來形容女子的身材標準。", sentence1: "她身材穠纖合度，穿什麼衣服都很好看。", sentence2: "這套禮服剪裁得宜，完美展現了她穠纖合度的身形。", scene: "胖瘦恰到好處。多用來形容女子的身材標準。" },
            { id: 421, term: "翻本雪恥", definition: "詞語。贏回輸掉的本錢，洗刷之前的恥辱。", sentence1: "上次比賽輸得很慘，這次我們一定要翻本雪恥。", sentence2: "經過一年的苦練，他終於在這次比賽中翻本雪恥，奪得冠軍。", scene: "贏回輸掉的本錢，洗刷之前的恥辱。" },

        const Icon = ({ path, className, fill = "none" }) => (
